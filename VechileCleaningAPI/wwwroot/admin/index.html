<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily View — Vehicle Cleaning Admin</title>
    <script src="../js/auth.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="admin-header">
        <div class="header-inner">
            <span class="brand">🚗 Vehicle Cleaning Admin</span>
            <nav class="main-nav">
                <button class="btn btn-sm" onclick="logout()" style="margin-left:auto;">Logout</button>
                <a href="/admin/index.html" class="nav-link active">Daily View</a>
                <a href="/admin/bookings.html" class="nav-link">Bookings</a>
                <a href="/admin/schedule.html" class="nav-link">Schedule</a>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1>Daily View</h1>
            <div class="date-form">
                <label for="date-input">Select Date:</label>
                <input type="date" id="date-input" class="date-input" />
            </div>
        </div>

        <div id="override-section"></div>
        <div id="slots-section"></div>
        <div id="bookings-section"></div>
    </main>

    <footer class="admin-footer">
        <p>&copy; <span id="year"></span> Vehicle Cleaning Admin</p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const dateInput = document.getElementById('date-input');

        function todayStr() {
            const d = new Date();
            return d.toISOString().slice(0, 10);
        }

        dateInput.value = todayStr();
        dateInput.addEventListener('change', loadPage);

        function formatHour(h) {
            const ampm = h >= 12 ? 'PM' : 'AM';
            const hour = h % 12 === 0 ? 12 : h % 12;
            return `${hour}:00 ${ampm}`;
        }

        function badge(status) {
            return `<span class="badge badge-${status.toLowerCase()}">${status}</span>`;
        }

        async function loadPage() {
            const date = dateInput.value;
            await Promise.all([loadOverride(date), loadSlots(date), loadBookings(date)]);
        }

        async function loadOverride(date) {
            const section = document.getElementById('override-section');
            try {
                const res = await authFetch('/api/overrides');
                const result = await res.json();
                if (!result.success) { section.innerHTML = ''; return; }

                const override = result.data.find(o => o.date && o.date.slice(0, 10) === date);

                if (override) {
                    const closedLabel = override.isFullyClosed ? '<span class="badge badge-cancelled">Fully Closed</span>' : '';
                    const hoursLabel = (override.startHour != null && override.endHour != null)
                        ? `Hours: ${override.startHour}:00 – ${override.endHour}:00` : '';
                    const capLabel = override.capacity != null ? `Capacity: ${override.capacity}` : '';
                    const details = [closedLabel, hoursLabel, capLabel].filter(Boolean).join(' &nbsp;|&nbsp; ');
                    section.innerHTML = `
                        <div class="alert alert-info" style="display:flex;align-items:center;gap:1rem;">
                            <strong>Override active:</strong> ${details}
                            <button class="btn btn-sm btn-danger" onclick="deleteOverride(${override.id}, '${date}')">Remove Override</button>
                        </div>
                        <div id="override-form-area"></div>
                    `;
                } else {
                    section.innerHTML = `
                        <div style="margin-bottom:1rem;">
                            <button class="btn btn-sm" onclick="showOverrideForm('${date}')">+ Add Date Override</button>
                        </div>
                        <div id="override-form-area"></div>
                    `;
                }
            } catch (e) {
                section.innerHTML = '';
            }
        }

        function showOverrideForm(date) {
            const area = document.getElementById('override-form-area');
            area.innerHTML = `
                <form class="card" style="padding:1rem;margin-bottom:1rem;" onsubmit="saveOverride(event, '${date}')">
                    <h3 class="section-title">Date Override for ${date}</h3>
                    <div class="form-row">
                        <label><input type="checkbox" id="ov-closed" /> Fully Closed</label>
                        <label>Start Hour: <input type="number" id="ov-start" class="small-input" min="0" max="23" placeholder="(optional)" /></label>
                        <label>End Hour: <input type="number" id="ov-end" class="small-input" min="1" max="24" placeholder="(optional)" /></label>
                        <label>Capacity: <input type="number" id="ov-cap" class="small-input" min="0" max="99" placeholder="(optional)" /></label>
                        <button type="submit" class="btn btn-sm">Save Override</button>
                        <button type="button" class="btn btn-sm" onclick="document.getElementById('override-form-area').innerHTML=''">Cancel</button>
                    </div>
                </form>
            `;
        }

        async function saveOverride(e, date) {
            e.preventDefault();
            const isFullyClosed = document.getElementById('ov-closed').checked;
            const startVal = document.getElementById('ov-start').value;
            const endVal = document.getElementById('ov-end').value;
            const capVal = document.getElementById('ov-cap').value;
            const payload = {
                date,
                isFullyClosed,
                startHour: startVal !== '' ? parseInt(startVal, 10) : null,
                endHour: endVal !== '' ? parseInt(endVal, 10) : null,
                capacity: capVal !== '' ? parseInt(capVal, 10) : null,
            };
            try {
                const res = await authFetch('/api/overrides', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.success) {
                    await loadPage();
                } else {
                    alert(result.message || 'Failed to save override.');
                }
            } catch (err) {
                alert('Network error.');
            }
        }

        async function deleteOverride(id, date) {
            if (!confirm('Remove override for this date?')) return;
            try {
                const res = await authFetch(`/api/overrides/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    await loadPage();
                } else {
                    alert(result.message || 'Failed to remove override.');
                }
            } catch (err) {
                alert('Network error.');
            }
        }

        async function loadSlots(date) {
            const section = document.getElementById('slots-section');
            section.innerHTML = '<div class="alert alert-info">Loading slots…</div>';
            try {
                const res = await authFetch(`/api/availability?date=${date}`);
                const result = await res.json();
                if (!result.success || !result.data || result.data.length === 0) {
                    section.innerHTML = '<div class="alert alert-info">No slots available for this date (day is closed or no schedule found).</div>';
                    return;
                }
                let rows = result.data.map(slot => `
                    <tr class="${slot.available === 0 ? 'row-full' : ''}">
                        <td>${slot.hour}:00</td>
                        <td>${slot.capacity}</td>
                        <td>${slot.booked}</td>
                        <td>${slot.available}</td>
                        <td>${slot.available === 0 ? badge('Full') : badge('Open')}</td>
                    </tr>
                `).join('');
                section.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Hour</th><th>Capacity</th><th>Booked</th><th>Available</th><th>Status</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch (e) {
                section.innerHTML = '<div class="alert alert-info">Error loading slots.</div>';
            }
        }

        async function loadBookings(date) {
            const section = document.getElementById('bookings-section');
            try {
                const res = await authFetch(`/api/bookings?date=${date}`);
                const result = await res.json();
                if (!result.success || !result.data || result.data.length === 0) {
                    section.innerHTML = '';
                    return;
                }
                const d = new Date(date + 'T00:00:00');
                const heading = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                let rows = result.data.map(b => `
                    <tr>
                        <td>${b.customerName}</td>
                        <td>${b.phone}</td>
                        <td>${b.hour}:00</td>
                        <td>${badge(b.status)}</td>
                    </tr>
                `).join('');
                section.innerHTML = `
                    <h2 class="section-title">Bookings for ${heading}</h2>
                    <table class="admin-table">
                        <thead>
                            <tr><th>Name</th><th>Phone</th><th>Hour</th><th>Status</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch (e) {
                section.innerHTML = '';
            }
        }

        loadPage();
    </script>
</body>
</html>
