<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Vehicle Cleaning Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand h1 {
            font-size: 1.5rem;
            color: #1a237e;
            margin-bottom: 0.25rem;
        }

        .login-brand p {
            font-size: 0.85rem;
            color: #666;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 2px solid #dde3f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #3949ab;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #3949ab;
        }

        .btn-login:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .error-msg {
            color: #e53935;
            font-size: 0.88rem;
            margin-top: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>🚗 Vehicle Cleaning</h1>
            <p>Admin Panel — Staff Login</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
            </div>
            <p id="error-msg" class="error-msg"></p>
            <button type="submit" class="btn-login" id="login-btn">Sign In</button>
        </form>
    </div>

    <script>
        // If already logged in, redirect to admin
        if (localStorage.getItem('auth_token')) {
            window.location.href = '/admin/index.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await res.json();

                if (result.success && result.data) {
                    localStorage.setItem('auth_token', result.data);
                    window.location.href = '/admin/index.html';
                } else {
                    errorEl.textContent = result.message || 'Invalid username or password.';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
