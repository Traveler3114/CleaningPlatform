<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users — Vehicle Cleaning Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #e8eaf6;
            color: #3949ab;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .name-cell {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .name-cell .full-name { font-weight: 600; color: #222; }
        .name-cell .username { font-size: 0.8rem; color: #888; }

        .badge-owner   { background: #ede7f6; color: #6a1b9a; }
        .badge-dispatcher { background: #e3f2fd; color: #1565c0; }
        .badge-cleaner { background: #e8f5e9; color: #2e7d32; }
        .badge-finance { background: #fff8e1; color: #f57f17; }
        .badge-client  { background: #fce4ec; color: #c62828; }

        .toggle-btn {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.deactivate {
            background: #fce4ec;
            color: #c62828;
        }

        .toggle-btn.deactivate:hover { background: #ef9a9a; }

        .toggle-btn.activate {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .toggle-btn.activate:hover { background: #a5d6a7; }

        .row-inactive { opacity: 0.55; }

        /* Create user modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: white;
            border-radius: 14px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin: 1rem;
        }

        .modal h2 {
            font-size: 1.2rem;
            color: #1a237e;
            margin-bottom: 1.25rem;
        }

        .modal .form-group { margin-bottom: 1rem; }

        .modal .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #555;
            margin-bottom: 0.35rem;
        }

        .modal .form-group input,
        .modal .form-group select {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border: 2px solid #dde3f0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }

        .modal .form-group input:focus,
        .modal .form-group select:focus { border-color: #3949ab; }

        .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.25rem;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #555;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-cancel:hover { background: #e0e0e0; }

        .modal-error {
            color: #c62828;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            flex: 1;
            min-width: 120px;
        }

        .stat-card .stat-num {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a237e;
            line-height: 1;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.3rem;
        }

        .you-badge {
            display: inline-block;
            background: #e8eaf6;
            color: #3949ab;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            margin-left: 0.3rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="header-inner">
            <!-- Injected by auth.js -->
        </div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1>User Accounts</h1>
            <button class="btn" id="create-user-btn">+ Create Account</button>
        </div>

        <div id="message-area"></div>

        <div class="stats-row" id="stats-row"></div>

        <div id="users-section"></div>
    </main>

    <footer class="admin-footer">
        <p>&copy; <span id="year"></span> Vehicle Cleaning Admin</p>
    </footer>

    <!-- Create User Modal -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal">
            <h2>Create New Account</h2>
            <div class="modal-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="new-name" placeholder="First name" />
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="new-surname" placeholder="Last name" />
                </div>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="new-username" placeholder="Login username" autocomplete="off" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="new-password" placeholder="Set a password" autocomplete="new-password" />
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="new-role">
                    <option value="Dispatcher">Dispatcher</option>
                    <option value="Cleaner">Cleaner</option>
                    <option value="Finance">Finance</option>
                    <option value="Owner">Owner</option>
                    <option value="Client">Client</option>
                </select>
            </div>
            <div class="modal-error" id="modal-error"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modal-cancel">Cancel</button>
                <button class="btn" id="modal-submit">Create Account</button>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Owner-only page
        if (!Auth.requireRole('Owner')) { /* redirected */ }
        injectAdminHeader('users');

        const currentUser = Auth.getUser();

        function showMessage(msg, isError) {
            const el = document.getElementById('message-area');
            el.innerHTML = `<div class="alert ${isError ? '' : 'alert-success'}" style="${isError ? 'background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;' : ''}">${msg}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 3000);
        }

        function getRoleClass(role) {
            return 'badge-' + (role || '').toLowerCase();
        }

        function getInitials(name, surname) {
            return ((name?.[0] || '') + (surname?.[0] || '')).toUpperCase();
        }

        async function loadUsers() {
            const section = document.getElementById('users-section');
            section.innerHTML = '<div class="alert alert-info">Loading users…</div>';

            try {
                const res = await apiFetch('/api/users');
                const result = await res.json();

                if (!result.success || !result.data) {
                    section.innerHTML = '<div class="alert alert-info">Failed to load users.</div>';
                    return;
                }

                const users = result.data;

                // Stats
                const total = users.length;
                const active = users.filter(u => u.isActive).length;
                const byRole = {};
                users.forEach(u => { byRole[u.role] = (byRole[u.role] || 0) + 1; });

                document.getElementById('stats-row').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-num">${total}</div>
                        <div class="stat-label">Total Accounts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num">${active}</div>
                        <div class="stat-label">Active</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num">${total - active}</div>
                        <div class="stat-label">Inactive</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num">${Object.keys(byRole).length}</div>
                        <div class="stat-label">Roles Used</div>
                    </div>
                `;

                const rows = users.map(u => {
                    const isYou = u.id === currentUser?.id;
                    const initials = getInitials(u.name, u.surname);
                    const canToggle = !isYou; // Can't deactivate yourself

                    return `
                        <tr class="${!u.isActive ? 'row-inactive' : ''}">
                            <td>
                                <div class="name-cell">
                                    <div class="user-avatar">${initials}</div>
                                    <div>
                                        <div class="full-name">
                                            ${u.name} ${u.surname}
                                            ${isYou ? '<span class="you-badge">You</span>' : ''}
                                        </div>
                                        <div class="username">@${u.username}</div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge ${getRoleClass(u.role)}">${u.role}</span>
                            </td>
                            <td>
                                <span class="badge ${u.isActive ? 'badge-completed' : 'badge-cancelled'}">
                                    ${u.isActive ? 'Active' : 'Inactive'}
                                </span>
                            </td>
                            <td>${new Date(u.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                            <td>
                                ${canToggle
                                    ? `<button class="toggle-btn ${u.isActive ? 'deactivate' : 'activate'}"
                                        onclick="toggleUser(${u.id}, ${u.isActive})">
                                        ${u.isActive ? 'Deactivate' : 'Activate'}
                                       </button>`
                                    : `<span style="font-size:0.8rem;color:#aaa;">—</span>`
                                }
                            </td>
                        </tr>
                    `;
                }).join('');

                section.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch (e) {
                section.innerHTML = '<div class="alert alert-info">Error loading users.</div>';
            }
        }

        async function toggleUser(id, currentlyActive) {
            try {
                const res = await apiFetch(`/api/users/${id}/toggle`, { method: 'PUT' });
                const result = await res.json();
                if (result.success) {
                    showMessage(`User ${currentlyActive ? 'deactivated' : 'activated'} successfully.`);
                    await loadUsers();
                } else {
                    showMessage(result.message || 'Failed to update user.', true);
                }
            } catch (e) {
                showMessage('Network error.', true);
            }
        }

        // ===== Create User Modal =====
        const modal = document.getElementById('create-modal');
        const modalError = document.getElementById('modal-error');

        document.getElementById('create-user-btn').addEventListener('click', () => {
            modal.classList.add('open');
            modalError.textContent = '';
            ['new-name', 'new-surname', 'new-username', 'new-password'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('new-role').value = 'Dispatcher';
        });

        document.getElementById('modal-cancel').addEventListener('click', () => {
            modal.classList.remove('open');
        });

        modal.addEventListener('click', e => {
            if (e.target === modal) modal.classList.remove('open');
        });

        document.getElementById('modal-submit').addEventListener('click', async () => {
            modalError.textContent = '';

            const name = document.getElementById('new-name').value.trim();
            const surname = document.getElementById('new-surname').value.trim();
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!name || !surname || !username || !password) {
                modalError.textContent = 'All fields are required.';
                return;
            }

            if (password.length < 6) {
                modalError.textContent = 'Password must be at least 6 characters.';
                return;
            }

            const btn = document.getElementById('modal-submit');
            btn.disabled = true;
            btn.textContent = 'Creating…';

            try {
                const res = await apiFetch('/api/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ name, surname, username, password, role })
                });
                const result = await res.json();

                if (result.success) {
                    modal.classList.remove('open');
                    showMessage(`Account for ${name} ${surname} created successfully.`);
                    await loadUsers();
                } else {
                    modalError.textContent = result.message || 'Failed to create account.';
                }
            } catch (e) {
                modalError.textContent = 'Network error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });

        loadUsers();
    </script>
</body>
</html>
