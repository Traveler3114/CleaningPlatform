<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing in...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 2rem; max-width: 420px; text-align: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #14b8a6; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #64748b; font-size: 0.88rem; }
        .error { color: #ef4444; }
        a { display: inline-block; background: #14b8a6; color: white; padding: 0.6rem 1.5rem; border-radius: 6px; text-decoration: none; font-size: 0.88rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <p id="status-text">Signing you in...</p>
    </div>

    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status-text').className = 'error';
                document.getElementById('status-text').innerHTML = 'Missing token. <a href="/portal/login.html">Request a new link</a>';
                return;
            }

            try {
                const res = await fetch('/api/portal/validate-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();

                if (data.success && data.data) {
                    localStorage.setItem('portalSession', data.data);
                    window.location.replace('/portal/index.html');
                } else {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('status-text').className = 'error';
                    var displayMsg = data.message || 'This link has expired.';
                    if (data.code && window.ERROR_CODE_MAP && window.ERROR_CODE_MAP[data.code] && window.__I18N_DATA) {
                        var t = window.__I18N_DATA[window.ERROR_CODE_MAP[data.code]];
                        if (t) displayMsg = t;
                    }
                    document.getElementById('status-text').innerHTML =
                        displayMsg + ' <a href="/portal/login.html">Request a new link</a>';
                }
            } catch (e) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status-text').className = 'error';
                document.getElementById('status-text').innerHTML = 'Could not connect. <a href="/portal/login.html">Try again</a>';
            }
        })();
    </script>
</body>
</html>
