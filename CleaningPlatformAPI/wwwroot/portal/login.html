<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Client Portal</title>
    <link rel="stylesheet" href="/portal/css/portal.css" />
</head>
<body class="login-page">
    <div class="login-card">
        <a href="/public/index.html" class="portal-logo" style="display:block;text-align:center;font-size:1.4rem;margin-bottom:0.5rem;">Chistify</a>
        <h1 style="text-align:center;">Welcome back</h1>
        <p style="text-align:center;">Enter your email and we'll send you a magic link to sign in.</p>

        <div id="error-container"></div>
        <div id="success-container"></div>

        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="ana@example.com" />
        </div>

        <button id="send-link-btn" class="btn" style="width:100%;justify-content:center;padding:0.7rem;">Send Magic Link</button>

        <p style="text-align:center;margin-top:1.25rem;font-size:0.8rem;">
            <a href="/public/index.html" class="link">&larr; Back to website</a>
        </p>

        <p style="text-align:center;margin-top:1rem;font-size:0.75rem;color:var(--text-muted);">
            For testing, the magic link will appear in the server console.
        </p>
    </div>
    <script src="/portal/js/portal-common.js"></script>
    <script>
        document.getElementById('send-link-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showError('Please enter your email address.');
                return;
            }

            const btn = document.getElementById('send-link-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch('/api/portal/send-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.success) {
                    showSuccess(data.data || data.message || 'Magic link sent! Check the server console.');
                    document.getElementById('email').value = '';
                } else {
                    showError(data.message || 'Something went wrong.');
                }
            } catch (e) {
                showError('Could not connect to server. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Magic Link';
            }
        });
    </script>
</body>
</html>
