<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_portal_bookings">My Bookings — Client Portal</title>
    <link rel="stylesheet" href="/portal/css/portal.css" />
</head>
<body>
    <header class="portal-header">
        <div class="header-inner"><div id="lang-switcher"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="hr">HR</button></div>
            <a href="/portal/index.html" class="portal-logo">Chistify</a>
            <div class="user-pill">
                <div class="user-pill-info">
                    <span class="user-pill-name">Loading...</span>
                    <span class="user-pill-email"></span>
                </div>
                <button id="logout-btn" class="logout-btn">Sign out</button>
            </div>
        </div>
    </header>
    <nav class="portal-nav" id="portal-nav"></nav>
    <main class="portal-main">
        <div class="page-header">
            <h1>My Bookings</h1>
            <div>
                <button class="btn btn-outline btn-sm" onclick="filterBookings('all')" id="filter-all">All</button>
                <button class="btn btn-outline btn-sm" onclick="filterBookings('upcoming')" id="filter-upcoming">Upcoming</button>
                <button class="btn btn-outline btn-sm" onclick="filterBookings('completed')" id="filter-completed">Completed</button>
            </div>
        </div>
        <div id="error-container"></div>
        <div id="bookings-list"></div>
    </main>
    <footer class="portal-footer">&copy; 2026 Chistify. All rights reserved.</footer>
    <script src="/portal/js/portal-common.js"></script>
    <script src="/portal/js/bookings.js"></script>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
