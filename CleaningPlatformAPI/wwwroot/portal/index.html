<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_portal_dashboard">Dashboard — Client Portal</title>
    <link rel="stylesheet" href="/portal/css/portal.css" />
</head>
<body>
    <header class="portal-header">
        <div class="header-inner"><div id="lang-switcher"></div>
            <a href="/portal/index.html" class="portal-logo">Chistify</a>
            <div class="user-pill">
                <div class="user-pill-info">
                    <span class="user-pill-name">Loading...</span>
                    <span class="user-pill-email"></span>
                </div>
                <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
            </div>
        </div>
    </header>
    <nav class="portal-nav" id="portal-nav"></nav>
    <main class="portal-main">
        <div class="page-header">
            <h1 data-i18n="nav_dashboard">Dashboard</h1>
        </div>
        <div id="error-container"></div>

        <section class="kpi-grid" id="kpi-grid"></section>

        <section class="card">
            <h2 class="card-title" data-i18n="section_upcoming_bookings">Upcoming Bookings</h2>
            <div id="upcoming-bookings"></div>
        </section>

        <section class="card">
            <h2 class="card-title" data-i18n="section_recent_invoices">Recent Invoices</h2>
            <div id="recent-invoices"></div>
        </section>
    </main>
    <footer class="portal-footer">&copy; 2026 Chistify. All rights reserved.</footer>
    <script src="/portal/js/portal-common.js"></script>
    <script src="/portal/js/dashboard.js"></script>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
