<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_daily">Daily View — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="nav_daily_view">Daily View</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="hr">HR</button></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
        </div>
    </header>
<main class="admin-main">
    <div class="page-header">
        
        <div class="date-form">
            <label for="selected-date" data-i18n="label_date">Date</label>
            <input type="date" id="selected-date" class="date-input" />
        </div>
    </div>
    <div id="error-container"></div>
    <section class="kpi-grid" id="kpi-grid"></section>
    <section class="detail-section">
        <h2 class="section-title" data-i18n="section_bookings">Bookings</h2>
        <div id="bookings-table"></div>
    </section>
    <section class="detail-section">
        <h2 class="section-title" data-i18n="section_slots">Slots</h2>
        <div id="slots-table"></div>
    </section>
</main>
<footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
<script src="/admin/js/admin-api.js"></script>
<script src="/admin/js/admin-common.js"></script>
<script src="/admin/js/dashboard.js"></script>
</div>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
