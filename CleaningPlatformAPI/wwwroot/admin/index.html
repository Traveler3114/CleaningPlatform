<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily View — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong>Daily View</strong></div>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn">Sign out</button>
        </div>
    </header>
<main class="admin-main">
    <div class="page-header">
        
        <div class="date-form">
            <label for="selected-date">Date</label>
            <input type="date" id="selected-date" class="date-input" />
        </div>
    </div>
    <div id="error-container"></div>
    <section class="kpi-grid" id="kpi-grid"></section>
    <section class="detail-section">
        <h2 class="section-title">Bookings</h2>
        <div id="bookings-table"></div>
    </section>
    <section class="detail-section">
        <h2 class="section-title">Slots</h2>
        <div id="slots-table"></div>
    </section>
</main>
<footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
<script src="/admin/js/admin-api.js"></script>
<script src="/admin/js/admin-common.js"></script>
<script src="/admin/js/dashboard.js"></script>
</div>
</body>
</html>
