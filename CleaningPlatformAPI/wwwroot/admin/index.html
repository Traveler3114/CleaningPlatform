<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily View — Vehicle Cleaning Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="admin-header">
        <div class="header-inner"></div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1>Daily View</h1>
            <div class="date-form">
                <label for="date-input">Select Date:</label>
                <input type="date" id="date-input" class="date-input" />
            </div>
        </div>

        <section class="kpi-grid" id="kpi-grid">
            <div class="kpi-card"><span>Today's total bookings</span><strong id="kpi-today">0</strong></div>
            <div class="kpi-card"><span>Pending bookings</span><strong id="kpi-pending">0</strong></div>
            <div class="kpi-card"><span>Confirmed bookings</span><strong id="kpi-confirmed">0</strong></div>
            <div class="kpi-card"><span>Completed this month</span><strong id="kpi-completed-month">0</strong></div>
        </section>

        <div id="override-section"></div>
        <div id="slots-section"></div>
        <div id="bookings-section"></div>
    </main>

    <footer class="admin-footer">
        <p>&copy; <span id="year"></span> Vehicle Cleaning Admin</p>
    </footer>

    <script src="../js/permissions.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        if (!injectAdminHeader('daily')) { /* redirected */ }

        const dateInput = document.getElementById('date-input');

        function todayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        function badge(status) {
            return `<span class="badge badge-${String(status).toLowerCase()}">${status}</span>`;
        }

        function unwrapData(result) {
            if (Array.isArray(result)) return result;
            if (result && typeof result === 'object' && 'success' in result) {
                return result.success ? (result.data || []) : [];
            }
            return [];
        }

        function normalizeDate(dateValue) {
            if (!dateValue) return '';
            return String(dateValue).slice(0, 10);
        }

        async function loadKpis() {
            try {
                const res = await apiFetch('/api/bookings');
                const raw = await res.json();
                const bookings = unwrapData(raw);

                const today = todayStr();
                const now = new Date();
                const year = now.getUTCFullYear();
                const month = now.getUTCMonth();

                const todayCount = bookings.filter(b => normalizeDate(b.date) === today).length;
                const pendingCount = bookings.filter(b => String(b.status).toLowerCase() === 'pending').length;
                const confirmedCount = bookings.filter(b => String(b.status).toLowerCase() === 'confirmed').length;
                const completedMonthCount = bookings.filter(b => {
                    if (String(b.status).toLowerCase() !== 'completed') return false;
                    const d = new Date(b.date);
                    return !Number.isNaN(d.getTime()) && d.getUTCFullYear() === year && d.getUTCMonth() === month;
                }).length;

                document.getElementById('kpi-today').textContent = todayCount;
                document.getElementById('kpi-pending').textContent = pendingCount;
                document.getElementById('kpi-confirmed').textContent = confirmedCount;
                document.getElementById('kpi-completed-month').textContent = completedMonthCount;
            } catch {
                document.getElementById('kpi-grid').insertAdjacentHTML('afterend', '<div class="alert alert-info">Failed to load KPI data.</div>');
            }
        }

        async function loadPage() {
            const date = dateInput.value;
            await Promise.all([loadKpis(), loadOverride(date), loadSlots(date), loadBookings(date)]);
        }

        async function loadOverride(date) {
            const section = document.getElementById('override-section');
            try {
                const res = await apiFetch('/api/overrides');
                const result = await res.json();
                if (!result.success) {
                    section.innerHTML = '';
                    return;
                }

                const override = result.data.find(o => o.date && o.date.slice(0, 10) === date);

                if (override) {
                    const closedLabel = override.isFullyClosed ? '<span class="badge badge-cancelled">Fully Closed</span>' : '';
                    const hoursLabel = (override.startHour != null && override.endHour != null)
                        ? `Hours: ${override.startHour}:00 – ${override.endHour}:00` : '';
                    const capLabel = override.capacity != null ? `Capacity: ${override.capacity}` : '';
                    const details = [closedLabel, hoursLabel, capLabel].filter(Boolean).join(' &nbsp;|&nbsp; ');
                    section.innerHTML = `
                        <div class="alert alert-info" style="display:flex;align-items:center;gap:1rem;">
                            <strong>Override active:</strong> ${details}
                            ${Auth.can('actions.override.manage')
                                ? `<button class="btn btn-sm btn-danger" onclick="deleteOverride(${override.id})">Remove Override</button>`
                                : ''}
                        </div>
                        <div id="override-form-area"></div>
                    `;
                } else {
                    section.innerHTML = `
                        <div style="margin-bottom:1rem;">
                            ${Auth.can('actions.override.manage')
                                ? `<button class="btn btn-sm" onclick="showOverrideForm('${date}')">+ Add Date Override</button>`
                                : ''}
                        </div>
                        <div id="override-form-area"></div>
                    `;
                }
            } catch {
                section.innerHTML = '';
            }
        }

        function showOverrideForm(date) {
            const area = document.getElementById('override-form-area');
            area.innerHTML = `
                <form class="card" style="padding:1rem;margin-bottom:1rem;" onsubmit="saveOverride(event, '${date}')">
                    <h3 class="section-title">Date Override for ${date}</h3>
                    <div class="form-row">
                        <label><input type="checkbox" id="ov-closed" /> Fully Closed</label>
                        <label>Start Hour: <input type="number" id="ov-start" class="small-input" min="0" max="23" placeholder="(optional)" /></label>
                        <label>End Hour: <input type="number" id="ov-end" class="small-input" min="1" max="24" placeholder="(optional)" /></label>
                        <label>Capacity: <input type="number" id="ov-cap" class="small-input" min="0" max="99" placeholder="(optional)" /></label>
                        <button type="submit" class="btn btn-sm">Save Override</button>
                        <button type="button" class="btn btn-sm" onclick="document.getElementById('override-form-area').innerHTML=''">Cancel</button>
                    </div>
                </form>
            `;
        }

        async function saveOverride(e, date) {
            e.preventDefault();
            const payload = {
                date,
                isFullyClosed: document.getElementById('ov-closed').checked,
                startHour: document.getElementById('ov-start').value === '' ? null : parseInt(document.getElementById('ov-start').value, 10),
                endHour: document.getElementById('ov-end').value === '' ? null : parseInt(document.getElementById('ov-end').value, 10),
                capacity: document.getElementById('ov-cap').value === '' ? null : parseInt(document.getElementById('ov-cap').value, 10)
            };

            try {
                const res = await apiFetch('/api/overrides', { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.success) {
                    await loadPage();
                } else {
                    alert(result.message || 'Failed to save override.');
                }
            } catch {
                alert('Network error.');
            }
        }

        async function deleteOverride(id) {
            if (!confirm('Remove override for this date?')) return;
            try {
                const res = await apiFetch(`/api/overrides/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    await loadPage();
                } else {
                    alert(result.message || 'Failed to remove override.');
                }
            } catch {
                alert('Network error.');
            }
        }

        async function loadSlots(date) {
            const section = document.getElementById('slots-section');
            section.innerHTML = '<div class="alert alert-info">Loading slots…</div>';
            try {
                const res = await fetch(`/api/availability?date=${date}`);
                const result = await res.json();
                if (!result.success || !result.data || result.data.length === 0) {
                    section.innerHTML = '<div class="alert alert-info">No slots available for this date.</div>';
                    return;
                }

                const rows = result.data.map(slot => `
                    <tr class="${slot.available === 0 ? 'row-full' : ''}">
                        <td>${slot.hour}:00</td>
                        <td>${slot.capacity}</td>
                        <td>${slot.booked}</td>
                        <td>${slot.available}</td>
                        <td>${slot.available === 0 ? badge('Full') : badge('Open')}</td>
                    </tr>
                `).join('');

                section.innerHTML = `
                    <h2 class="section-title">Slots</h2>
                    <table class="admin-table">
                        <thead>
                            <tr><th>Hour</th><th>Capacity</th><th>Booked</th><th>Available</th><th>Status</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch {
                section.innerHTML = '<div class="alert alert-info">Error loading slots.</div>';
            }
        }

        async function loadBookings(date) {
            const section = document.getElementById('bookings-section');
            try {
                const res = await apiFetch(`/api/bookings?date=${date}`);
                const raw = await res.json();
                const bookings = unwrapData(raw);

                if (!bookings.length) {
                    section.innerHTML = '';
                    return;
                }

                const heading = new Date(date + 'T00:00:00').toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });

                const rows = bookings.map(b => `
                    <tr>
                        <td>${b.id}</td>
                        <td>${b.customerName}</td>
                        <td>${b.phone}</td>
                        <td>${b.hour}:00</td>
                        <td>${badge(b.status)}</td>
                        <td><a class="btn btn-sm" href="/admin/booking-detail.html?id=${b.id}">View</a></td>
                    </tr>
                `).join('');

                section.innerHTML = `
                    <h2 class="section-title">Bookings for ${heading}</h2>
                    <table class="admin-table">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Phone</th><th>Hour</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch {
                section.innerHTML = '';
            }
        }

        dateInput.value = todayStr();
        dateInput.addEventListener('change', loadPage);
        loadPage();
    </script>
</body>
</html>
