<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_services">Services — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="page_admin_services">Services</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            
            <button id="new-service-btn" class="btn">+ Create Service</button>
        </div>
        <div id="error-container"></div>
        <div id="services-list"></div>

        <!-- Service Modal -->
        <div id="service-modal" class="modal-backdrop" style="display:none;">
            <div class="modal-panel">
                <h2 class="section-title" id="service-modal-title">Create Service</h2>
                <form id="service-form" class="form-grid two-col">
                    <input type="hidden" id="service-id" />
                    <label><span data-i18n="th_code">Code</span> <input type="text" id="service-code" class="small-input" required /></label>
                    <label><span data-i18n="th_name">Name</span> <input type="text" id="service-name" class="text-input" required /></label>
                    <label><span data-i18n="th_category">Category</span>
                        <select id="service-category" class="text-input">
                            <option value="">-- Select --</option>
                            <option value="Stairs">Stairs</option>
                            <option value="Office">Office</option>
                            <option value="Private">Private</option>
                            <option value="Special">Special</option>
                            <option value="Carpet">Carpet</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Exterior">Exterior</option>
                            <option value="Laundry">Laundry</option>
                            <option value="Vehicle">Vehicle</option>
                            <option value="Boat">Boat</option>
                        </select>
                    </label>
                    <label><span data-i18n="th_unit">Unit</span> <input type="text" id="service-unit" class="text-input" /></label>
                    <label><span data-i18n="th_base_price">Base Price</span> <input type="number" id="service-base-price" step="0.01" class="small-input" /></label>
                    <label><span data-i18n="th_type">Service Type</span>
                        <select id="service-service-type" class="text-input">
                            <option value="SiteBased">SiteBased</option>
                            <option value="Vehicle">Vehicle</option>
                            <option value="Boat">Boat</option>
                        </select>
                    </label>
                    <label class="checkbox-label"><input type="checkbox" id="service-active" checked /> Active</label>
                    <div class="modal-actions full-span">
                        <button type="submit" class="btn btn-sm">Save</button>
                        <button type="button" class="btn btn-sm" onclick="closeServiceModal()">Cancel</button>
                    </div>
                </form>
                <form id="service-delete-form" style="display:none; margin-top:0.75rem;">
                    <button type="submit" class="btn btn-sm" onclick="return confirm('Delete this service?')">Delete</button>
                </form>
            </div>
        </div>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/services.js"></script>
</div>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
