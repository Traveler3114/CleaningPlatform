<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Services — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
    <header class="admin-header">
        <div class="header-inner">
            <span class="brand">Cleaning Platform</span>
            <nav class="main-nav">
                <div class="nav-group">
                    <button class="nav-group__label">Operations</button>
                    <div class="nav-group__dropdown">
                        <a href="/admin/index.html" class="nav-group__item">Daily View</a>
                        <a href="/admin/calendar.html" class="nav-group__item">Calendar</a>
                    </div>
                </div>
                <div class="nav-group">
                    <button class="nav-group__label">Bookings</button>
                    <div class="nav-group__dropdown">
                        <a href="/admin/bookings.html" class="nav-group__item">Bookings</a>
                        <a href="/admin/invoices.html" class="nav-group__item">Invoices</a>
                    </div>
                </div>
                <div class="nav-group">
                    <button class="nav-group__label">Clients</button>
                    <div class="nav-group__dropdown">
                        <a href="/admin/clients.html" class="nav-group__item">Client List</a>
                    </div>
                </div>
                <div class="nav-group">
                    <button class="nav-group__label">Config</button>
                    <div class="nav-group__dropdown">
                        <a href="/admin/schedule.html" class="nav-group__item">Schedule</a>
                        <a href="/admin/services.html" class="nav-group__item">Services</a>
                        <a href="/admin/sops.html" class="nav-group__item">SOPs</a>
                    </div>
                </div>
                <div class="nav-group">
                    <button class="nav-group__label">Admin</button>
                    <div class="nav-group__dropdown">
                        <a href="/admin/users.html" class="nav-group__item">Users</a>
                        <a href="/admin/roles.html" class="nav-group__item">Roles</a>
                        <a href="/admin/reports.html" class="nav-group__item">Reports</a>
                    </div>
                </div>
            </nav>
            <div class="user-pill">
                <div class="user-pill-info">
                    <a href="/admin/profile.html" class="user-pill-name">Loading...</a>
                    <span class="user-pill-role"></span>
                </div>
                <button id="logout-btn" class="logout-btn">Sign out</button>
            </div>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            <h1>Services</h1>
            <button id="new-service-btn" class="btn">+ Create Service</button>
        </div>
        <div id="error-container"></div>
        <div id="services-list"></div>

        <!-- Service Modal -->
        <div id="service-modal" class="modal-backdrop" style="display:none;">
            <div class="modal-panel">
                <h2 class="section-title" id="service-modal-title">Create Service</h2>
                <form id="service-form" class="form-grid two-col">
                    <input type="hidden" id="service-id" />
                    <label>Code <input type="text" id="service-code" class="small-input" required /></label>
                    <label>Name <input type="text" id="service-name" class="text-input" required /></label>
                    <label>Category <input type="text" id="service-category" class="text-input" /></label>
                    <label>Unit <input type="text" id="service-unit" class="text-input" /></label>
                    <label>Price Min <input type="number" id="service-price-min" step="0.01" class="small-input" /></label>
                    <label>Price Max <input type="number" id="service-price-max" step="0.01" class="small-input" /></label>
                    <label>Price Avg <input type="number" id="service-price-avg" step="0.01" class="small-input" /></label>
                    <label class="checkbox-label"><input type="checkbox" id="service-active" checked /> Active</label>
                    <div class="modal-actions full-span">
                        <button type="submit" class="btn btn-sm">Save</button>
                        <button type="button" class="btn btn-sm" onclick="closeServiceModal()">Cancel</button>
                    </div>
                </form>
                <form id="service-delete-form" style="display:none; margin-top:0.75rem;">
                    <button type="submit" class="btn btn-sm" onclick="return confirm('Delete this service?')">Delete</button>
                </form>
            </div>
        </div>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/services.js"></script>
</body>
</html>
