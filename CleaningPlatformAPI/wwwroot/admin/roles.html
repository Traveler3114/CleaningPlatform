<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_roles">Roles — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="page_admin_roles">Roles</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="hr">HR</button></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            
            <button id="new-role-btn" class="btn">+ New Role</button>
        </div>
        <div id="error-container"></div>
        <div id="roles-list"></div>

        <!-- Role Modal -->
        <div id="role-modal" class="modal-backdrop" style="display:none;">
            <div class="modal-panel">
                <h2 class="section-title" id="role-modal-title">Create Role</h2>
                <form id="role-create-form" class="form-grid">
                    <label><span data-i18n="label_role">Role name</span> <input type="text" id="role-name" class="text-input" required /></label>
                    <div class="permission-grid" id="permissions-grid"></div>
                    <div class="modal-actions">
                        <button type="submit" class="btn btn-sm">Save</button>
                        <button type="button" class="btn btn-sm" onclick="closeRoleModal()">Cancel</button>
                    </div>
                </form>
                <form id="role-delete-form" style="display:none; margin-top:0.75rem;">
                    <button type="submit" class="btn btn-sm" onclick="return confirm('Delete this role?')">Delete Role</button>
                </form>
            </div>
        </div>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/roles.js"></script>
</div>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
