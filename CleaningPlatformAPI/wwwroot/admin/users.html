<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">Clean<span>Pro</span></div>
    <nav class="sidebar-nav">
        <div class="nav-section">
            <span class="nav-section-title">Operations</span>
            <a href="/admin/index.html" class="nav-item">Daily View</a>
            <a href="/admin/calendar.html" class="nav-item">Calendar</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Bookings</span>
            <a href="/admin/bookings.html" class="nav-item">Bookings</a>
            <a href="/admin/recurring.html" class="nav-item">Recurring</a>
            <a href="/admin/invoices.html" class="nav-item">Invoices</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Clients</span>
            <a href="/admin/clients.html" class="nav-item">Client List</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Config</span>
            <a href="/admin/schedule.html" class="nav-item">Schedule</a>
            <a href="/admin/services.html" class="nav-item">Services</a>
            <a href="/admin/sops.html" class="nav-item">SOPs</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Admin</span>
            <a href="/admin/users.html" class="nav-item">Users</a>
            <a href="/admin/roles.html" class="nav-item">Roles</a>
            <a href="/admin/reports.html" class="nav-item">Reports</a>
        </div>
    </nav>
</aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong>Users</strong></div>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn">Sign out</button>
        </div>
    </header>
<main class="admin-main">
    <div class="page-header">
        
        <button id="new-user-btn" class="btn">+ New User</button>
    </div>
    <div id="error-container"></div>
    <div id="users-list"></div>

    <!-- New User Modal -->
    <div id="new-user-modal" class="modal-backdrop" style="display:none;">
        <div class="modal-panel">
            <h2 class="section-title">Create User</h2>
            <form id="create-user-form" class="form-grid two-col">
                <label>First name <input type="text" id="user-firstname" class="text-input" required /></label>
                <label>Last name <input type="text" id="user-lastname" class="text-input" required /></label>
                <label>Password <input type="password" id="user-password" class="text-input" required /></label>
                <label>Role <select id="user-role" class="status-select"></select></label>
                <div class="modal-actions full-span">
                    <button type="submit" class="btn btn-sm">Create</button>
                    <button type="button" class="btn btn-sm" onclick="closeUserModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- User Detail Modal -->
    <div id="user-modal" class="modal-backdrop" style="display:none;">
        <div class="modal-panel">
            <h2 class="section-title">User Details</h2>
            <div class="form-grid two-col">
                <label>Username <input id="modal-username" class="text-input" readonly /></label>
                <label>Full Name <input id="modal-fullname" class="text-input" readonly /></label>
                <label>Role <input id="modal-role" class="text-input" readonly /></label>
                <label>Active <input id="modal-active" class="text-input" readonly /></label>
            </div>
            <h3 class="section-title" style="margin-top:1rem;">Reset Password</h3>
            <form id="reset-password-form" class="form-grid">
                <input type="hidden" id="reset-user-id" />
                <label>New Password <input type="password" id="reset-password" class="text-input" required minlength="8" /></label>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-sm">Reset Password</button>
                    <button type="button" class="btn btn-sm" onclick="closeDetailUserModal()">Close</button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
<script src="/admin/js/admin-api.js"></script>
<script src="/admin/js/admin-common.js"></script>
<script src="/admin/js/users.js"></script>
</div>
</body>
</html>
