<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Detail — Vehicle Cleaning Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="admin-header"><div class="header-inner"></div></header>

    <main class="admin-main">
        <div id="message-area"></div>

        <section class="detail-section" id="invoice-header"></section>
        <section class="detail-section" id="invoice-lines"></section>
        <section class="detail-section" id="invoice-payments"></section>

        <button class="btn btn-sm" id="back-btn">Back</button>
    </main>

    <footer class="admin-footer">
        <p>&copy; <span id="year"></span> Vehicle Cleaning Admin</p>
    </footer>

    <script src="../js/permissions.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        if (!injectAdminHeader('invoices')) { /* redirected */ }
        if (!Auth.requirePermission('pages.bookings')) { /* redirected */ }

        const canManageInvoice = Auth.can('actions.booking.updateStatus');

        const invoiceId = Number(new URLSearchParams(window.location.search).get('id'));
        if (!invoiceId) window.location.href = '/admin/invoices.html';

        let invoice = null;

        function esc(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showMessage(message, isError = false) {
            const area = document.getElementById('message-area');
            area.innerHTML = `<div class="alert ${isError ? '' : 'alert-success'}">${esc(message)}</div>`;
            if (isError) {
                const alert = area.querySelector('.alert');
                alert.style.background = '#fce4ec';
                alert.style.color = '#c62828';
                alert.style.border = '1px solid #ef9a9a';
            }
            setTimeout(() => { area.innerHTML = ''; }, 3500);
        }

        function renderHeader() {
            document.title = `${invoice.invoiceNumber} — Invoice Detail`;
            document.getElementById('invoice-header').innerHTML = `
                <div class="page-header">
                    <div>
                        <h1>Invoice ${esc(invoice.invoiceNumber)}</h1>
                        <p>
                            Client: <a href="/admin/client.html?id=${invoice.clientId}">${esc(invoice.clientName || '-')}</a> &nbsp;|&nbsp;
                            Issue: ${String(invoice.issueDate || '').slice(0, 10)} &nbsp;|&nbsp;
                            Due: ${String(invoice.dueDate || '').slice(0, 10)}
                        </p>
                    </div>
                    <span class="badge badge-${String(invoice.status || '').toLowerCase()}">${esc(invoice.status)}</span>
                </div>
                <div class="kpi-grid" style="margin-top:0.8rem;">
                    <div class="kpi-card"><span>Subtotal</span><strong>${Number(invoice.subTotal || 0).toFixed(2)}</strong></div>
                    <div class="kpi-card"><span>VAT</span><strong>${Number(invoice.vatAmount || 0).toFixed(2)}</strong></div>
                    <div class="kpi-card"><span>Total</span><strong>${Number(invoice.totalAmount || 0).toFixed(2)}</strong></div>
                    <div class="kpi-card"><span>Paid</span><strong>${Number(invoice.paidAmount || 0).toFixed(2)}</strong></div>
                    <div class="kpi-card"><span>Balance</span><strong>${Number(invoice.balanceDue || 0).toFixed(2)}</strong></div>
                </div>
                ${canManageInvoice ? `
                <div class="inline-form" style="margin-top:0.8rem;">
                    <button class="btn btn-sm" id="mark-sent-btn">Mark Sent</button>
                    <button class="btn btn-sm" id="mark-paid-btn">Mark Paid</button>
                </div>` : ''}
            `;

            if (canManageInvoice) {
                document.getElementById('mark-sent-btn').addEventListener('click', () => markStatus('Sent'));
                document.getElementById('mark-paid-btn').addEventListener('click', () => markStatus('Paid'));
            }
        }

        function renderLines() {
            const lines = Array.isArray(invoice.lines) ? invoice.lines : [];
            if (!lines.length) {
                document.getElementById('invoice-lines').innerHTML = '<div class="alert alert-info">No line items.</div>';
                return;
            }

            const rows = lines.map(line => `
                <tr>
                    <td>${esc(line.description)}</td>
                    <td>${Number(line.quantity || 0).toFixed(2)}</td>
                    <td>${Number(line.unitPrice || 0).toFixed(2)}</td>
                    <td>${Number(line.discountPct || 0).toFixed(2)}%</td>
                    <td>${Number(line.vatPct || 0).toFixed(2)}%</td>
                    <td>${Number(line.lineTotalAmount || 0).toFixed(2)}</td>
                    <td>${esc(line.sourceType || '-')}</td>
                </tr>
            `).join('');

            document.getElementById('invoice-lines').innerHTML = `
                <h2 class="section-title">Line Items</h2>
                <table class="admin-table">
                    <thead>
                        <tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Discount</th><th>VAT</th><th>Line Total</th><th>Source</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderPayments() {
            const payments = Array.isArray(invoice.payments) ? invoice.payments : [];
            const paymentRows = payments.length
                ? payments.map(payment => `
                    <tr>
                        <td>${String(payment.paymentDate || '').slice(0, 10)}</td>
                        <td>${Number(payment.amount || 0).toFixed(2)}</td>
                        <td>${esc(payment.method || '-')}</td>
                        <td>${esc(payment.reference || '-')}</td>
                        <td>${esc(payment.notes || '-')}</td>
                    </tr>
                `).join('')
                : '<tr><td colspan="5">No payments recorded.</td></tr>';

            document.getElementById('invoice-payments').innerHTML = `
                <h2 class="section-title">Payments</h2>
                ${canManageInvoice ? `
                <div class="card-lite" style="margin-bottom:1rem;">
                    <h3 class="section-title">Record Payment</h3>
                    <div class="inline-form" style="flex-wrap:wrap;">
                        <label>Date <input id="payment-date" class="small-input" type="date" value="${new Date().toISOString().slice(0, 10)}" /></label>
                        <label>Amount <input id="payment-amount" class="small-input" type="number" step="0.01" min="0.01" /></label>
                        <label>Method
                            <select id="payment-method" class="status-select">
                                <option value="BankTransfer">BankTransfer</option>
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                                <option value="Other">Other</option>
                            </select>
                        </label>
                        <label>Reference <input id="payment-reference" class="text-input" /></label>
                        <label>Notes <input id="payment-notes" class="text-input" /></label>
                        <button id="record-payment-btn" class="btn btn-sm">Record</button>
                    </div>
                </div>
                ` : ''}
                <table class="admin-table">
                    <thead>
                        <tr><th>Date</th><th>Amount</th><th>Method</th><th>Reference</th><th>Notes</th></tr>
                    </thead>
                    <tbody>${paymentRows}</tbody>
                </table>
            `;

            if (canManageInvoice) {
                document.getElementById('record-payment-btn').addEventListener('click', recordPayment);
            }
        }

        async function markStatus(status) {
            try {
                const res = await apiFetch(`/api/invoices/${invoiceId}/status`, {
                    method: 'PUT',
                    body: JSON.stringify({ status })
                });
                const result = await res.json();
                if (!res.ok) {
                    showMessage(typeof result === 'string' ? result : (result?.message || 'Failed to update invoice status.'), true);
                    return;
                }
                invoice = result;
                showMessage(`Invoice marked ${status}.`);
                renderHeader();
                renderLines();
                renderPayments();
            } catch {
                showMessage('Network error while updating status.', true);
            }
        }

        async function recordPayment() {
            const paymentDate = document.getElementById('payment-date').value;
            const amount = Number(document.getElementById('payment-amount').value);
            const method = document.getElementById('payment-method').value;
            const reference = document.getElementById('payment-reference').value.trim() || null;
            const notes = document.getElementById('payment-notes').value.trim() || null;

            if (!paymentDate || !amount || amount <= 0) {
                showMessage('Payment date and positive amount are required.', true);
                return;
            }

            try {
                const res = await apiFetch(`/api/invoices/${invoiceId}/payments`, {
                    method: 'POST',
                    body: JSON.stringify({ paymentDate, amount, method, reference, notes })
                });
                const result = await res.json();
                if (!res.ok) {
                    showMessage(typeof result === 'string' ? result : (result?.message || 'Failed to record payment.'), true);
                    return;
                }

                invoice = result;
                showMessage('Payment recorded.');
                renderHeader();
                renderLines();
                renderPayments();
            } catch {
                showMessage('Network error while recording payment.', true);
            }
        }

        async function loadInvoice() {
            try {
                const res = await apiFetch(`/api/invoices/${invoiceId}`);
                if (!res.ok) {
                    showMessage('Invoice not found.', true);
                    return;
                }
                invoice = await res.json();
                renderHeader();
                renderLines();
                renderPayments();
            } catch {
                showMessage('Failed to load invoice.', true);
            }
        }

        document.getElementById('back-btn').addEventListener('click', () => {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/admin/invoices.html';
            }
        });

        loadInvoice();
    </script>
</body>
</html>
