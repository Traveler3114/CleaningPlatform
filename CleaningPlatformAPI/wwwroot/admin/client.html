<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Profile — Vehicle Cleaning Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="admin-header"><div class="header-inner"></div></header>

    <main class="admin-main">
        <div id="message-area"></div>

        <section class="detail-section" id="client-header-section">
            <div class="page-header">
                <div>
                    <h1 id="client-name">Client</h1>
                    <div id="client-badges" style="margin-top:0.4rem;"></div>
                </div>
                <div class="inline-form" style="flex-wrap:wrap;">
                    <button id="edit-client-btn" class="btn btn-sm">Edit</button>
                    <select id="type-convert-select" class="status-select">
                        <option value="">Convert Type...</option>
                        <option value="OneTime">OneTime</option>
                        <option value="RepeatIndividual">RepeatIndividual</option>
                        <option value="RepeatBusiness">RepeatBusiness</option>
                    </select>
                    <button id="new-booking-btn" class="btn btn-sm" style="display:none;">New Booking</button>
                </div>
            </div>
            <div id="client-edit-area" class="card-lite" style="display:none;"></div>
        </section>

        <section class="detail-section">
            <h2 class="section-title">Contacts</h2>
            <div id="contacts-table"></div>
        </section>

        <section class="detail-section">
            <h2 class="section-title">Sites</h2>
            <div id="sites-table"></div>
            <div id="sites-add-form" class="card-lite"></div>
        </section>

        <section class="detail-section">
            <h2 class="section-title">Booking History</h2>
            <div id="bookings-table"></div>
        </section>
    </main>

    <footer class="admin-footer">
        <p>&copy; <span id="year"></span> Vehicle Cleaning Admin</p>
    </footer>

    <script src="../js/permissions.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        if (!injectAdminHeader('clients')) { /* redirected */ }
        if (!Auth.requirePermission('pages.clients')) { /* redirected */ }

        const clientId = Number(new URLSearchParams(window.location.search).get('id'));
        if (!clientId) {
            window.location.href = '/admin/clients.html';
        }

        const siteTypes = ['', 'Office', 'Stairwell', 'Garage', 'Facility', 'Boat', 'Vehicle', 'Other'];

        let client = null;
        let editingContacts = [];

        function esc(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function badgeClass(value) {
            return `badge-${String(value || '').toLowerCase()}`;
        }

        function statusBadge(active) {
            return `<span class="badge ${active ? 'badge-active' : 'badge-inactive'}">${active ? 'Active' : 'Inactive'}</span>`;
        }

        function showMessage(message, isError = false) {
            const area = document.getElementById('message-area');
            area.innerHTML = `<div class="alert ${isError ? '' : 'alert-success'}">${esc(message)}</div>`;
            if (isError) {
                const alert = area.querySelector('.alert');
                alert.style.background = '#fce4ec';
                alert.style.color = '#c62828';
                alert.style.border = '1px solid #ef9a9a';
            }
            setTimeout(() => { area.innerHTML = ''; }, 3500);
        }

        function renderHeader() {
            document.title = `${client.clientName} — Client Profile`;
            document.getElementById('client-name').textContent = client.clientName;
            document.getElementById('client-badges').innerHTML = `
                <span class="badge ${badgeClass(client.type)}">${esc(client.type)}</span>
                ${statusBadge(client.isActive)}
            `;

            const newBookingBtn = document.getElementById('new-booking-btn');
            newBookingBtn.style.display = (client.type === 'RepeatIndividual' || client.type === 'RepeatBusiness') ? '' : 'none';
        }

        function renderContacts() {
            const contacts = Array.isArray(client.contacts) ? client.contacts : [];
            if (!contacts.length) {
                document.getElementById('contacts-table').innerHTML = '<div class="alert alert-info">No contacts found.</div>';
                return;
            }

            const rows = contacts.map(c => `
                <tr class="${c.isActive ? '' : 'row-inactive'}">
                    <td>${esc(c.contactName)}</td>
                    <td>${esc(c.role || '-')}</td>
                    <td>${esc(c.phone || '-')}</td>
                    <td>${esc(c.email || '-')}</td>
                    <td>${c.isPrimary ? '<span class="badge badge-active">Primary</span>' : '-'}</td>
                    <td>${statusBadge(c.isActive)}</td>
                </tr>
            `).join('');

            document.getElementById('contacts-table').innerHTML = `
                <table class="admin-table">
                    <thead>
                        <tr><th>Name</th><th>Role</th><th>Phone</th><th>Email</th><th>Primary</th><th>Active</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="alert alert-info">Use Edit to update client and contacts in one save action.</div>
            `;
        }

        function siteTypeOptions(selected) {
            return siteTypes.map(type => `<option value="${type}"${selected === type ? ' selected' : ''}>${type || '—'}</option>`).join('');
        }

        function renderSites() {
            const sites = Array.isArray(client.sites) ? client.sites : [];
            if (!sites.length) {
                document.getElementById('sites-table').innerHTML = '<div class="alert alert-info">No sites found for this client.</div>';
            } else {
                const rows = sites.map(site => `
                    <tr class="${site.isActive ? '' : 'row-inactive'}">
                        <td><input id="site-name-${site.id}" class="text-input" value="${esc(site.siteName)}" /></td>
                        <td><input id="site-address-${site.id}" class="text-input" value="${esc(site.address)}" /></td>
                        <td><input id="site-city-${site.id}" class="small-input" value="${esc(site.city || '')}" /></td>
                        <td><input id="site-postal-${site.id}" class="small-input" value="${esc(site.postalCode || '')}" /></td>
                        <td>
                            <select id="site-type-${site.id}" class="status-select">${siteTypeOptions(site.siteType || '')}</select>
                        </td>
                        <td><input id="site-area-${site.id}" class="small-input" type="number" step="0.01" min="0" value="${site.floorAreaM2 ?? ''}" /></td>
                        <td><input id="site-notes-${site.id}" class="text-input" value="${esc(site.accessNotes || '')}" /></td>
                        <td><input id="site-active-${site.id}" type="checkbox" ${site.isActive ? 'checked' : ''} /></td>
                        <td>
                            <button class="btn btn-sm save-site-btn" data-site-id="${site.id}">Save</button>
                            ${site.isActive ? `<button class="btn btn-sm deactivate-site-btn" data-site-id="${site.id}">Deactivate</button>` : ''}
                        </td>
                    </tr>
                `).join('');

                document.getElementById('sites-table').innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Site Name</th><th>Address</th><th>City</th><th>Postal</th><th>Type</th>
                                <th>Area m²</th><th>Access Notes</th><th>Active</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            }

            document.querySelectorAll('.save-site-btn').forEach(btn => {
                btn.addEventListener('click', () => saveSite(Number(btn.dataset.siteId)));
            });
            document.querySelectorAll('.deactivate-site-btn').forEach(btn => {
                btn.addEventListener('click', () => deactivateSite(Number(btn.dataset.siteId)));
            });

            document.getElementById('sites-add-form').innerHTML = `
                <h3 class="section-title">+ Add Site</h3>
                <div class="form-grid two-col">
                    <label>Site Name <input id="new-site-name" class="text-input" /></label>
                    <label>Address <input id="new-site-address" class="text-input" /></label>
                    <label>City <input id="new-site-city" class="text-input" /></label>
                    <label>Postal Code <input id="new-site-postal" class="text-input" /></label>
                    <label>Type
                        <select id="new-site-type" class="status-select">${siteTypeOptions('')}</select>
                    </label>
                    <label>Floor Area m² <input id="new-site-area" class="text-input" type="number" min="0" step="0.01" /></label>
                    <label style="grid-column:1 / -1;">Access Notes <input id="new-site-notes" class="text-input" /></label>
                </div>
                <div class="modal-actions">
                    <button id="add-site-btn" class="btn btn-sm">Add Site</button>
                </div>
            `;

            document.getElementById('add-site-btn').addEventListener('click', addSite);
        }

        function renderBookings() {
            const bookings = Array.isArray(client.bookings) ? client.bookings : [];
            if (!bookings.length) {
                document.getElementById('bookings-table').innerHTML = '<div class="alert alert-info">No bookings found.</div>';
                return;
            }

            const rows = bookings.map(b => `
                <tr>
                    <td>${String(b.date || '').slice(0, 10)}</td>
                    <td>${b.hour}:00</td>
                    <td><span class="badge badge-${String(b.status).toLowerCase()}">${esc(b.status)}</span></td>
                    <td>${b.servicesCount || 0}</td>
                    <td><a class="btn btn-sm" href="/admin/booking-detail.html?id=${b.id}">View</a></td>
                </tr>
            `).join('');

            document.getElementById('bookings-table').innerHTML = `
                <table class="admin-table">
                    <thead>
                        <tr><th>Date</th><th>Time</th><th>Status</th><th>Services</th><th>Actions</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function emptyContact() {
            return {
                id: null,
                contactName: '',
                role: '',
                phone: '',
                email: '',
                address: '',
                isPrimary: editingContacts.length === 0,
                isActive: true
            };
        }

        function renderContactsEditor() {
            const tableRows = editingContacts.map((contact, index) => `
                <tr class="${contact.isActive ? '' : 'row-inactive'}">
                    <td><input class="text-input" data-contact-field="contactName" data-index="${index}" value="${esc(contact.contactName || '')}" /></td>
                    <td><input class="small-input" data-contact-field="role" data-index="${index}" value="${esc(contact.role || '')}" /></td>
                    <td><input class="small-input" data-contact-field="phone" data-index="${index}" value="${esc(contact.phone || '')}" /></td>
                    <td><input class="text-input" data-contact-field="email" data-index="${index}" value="${esc(contact.email || '')}" /></td>
                    <td><input type="radio" name="primary-contact" data-contact-field="isPrimary" data-index="${index}" ${contact.isPrimary ? 'checked' : ''} /></td>
                    <td><input type="checkbox" data-contact-field="isActive" data-index="${index}" ${contact.isActive ? 'checked' : ''} /></td>
                    <td><button type="button" class="btn btn-sm remove-contact-row-btn" data-index="${index}">Remove</button></td>
                </tr>
            `).join('');

            document.getElementById('contact-editor').innerHTML = `
                <table class="admin-table">
                    <thead>
                        <tr><th>Name</th><th>Role</th><th>Phone</th><th>Email</th><th>Primary</th><th>Active</th><th>Actions</th></tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
                <button type="button" class="btn btn-sm" id="add-contact-row-btn">+ Add Contact</button>
            `;

            document.getElementById('add-contact-row-btn').addEventListener('click', () => {
                editingContacts.push(emptyContact());
                renderContactsEditor();
            });

            document.querySelectorAll('#contact-editor [data-contact-field]').forEach(input => {
                input.addEventListener('input', onContactFieldChanged);
                input.addEventListener('change', onContactFieldChanged);
            });
            document.querySelectorAll('.remove-contact-row-btn').forEach(btn => {
                btn.addEventListener('click', () => removeContactRow(Number(btn.dataset.index)));
            });
        }

        function onContactFieldChanged(event) {
            const index = Number(event.target.dataset.index);
            const field = event.target.dataset.contactField;
            if (!Number.isInteger(index) || !editingContacts[index]) return;

            if (field === 'isPrimary') {
                editingContacts = editingContacts.map((contact, idx) => ({
                    ...contact,
                    isPrimary: idx === index
                }));
                renderContactsEditor();
                return;
            }

            if (field === 'isActive') {
                editingContacts[index][field] = event.target.checked;
            } else {
                editingContacts[index][field] = event.target.value;
            }
        }

        function removeContactRow(index) {
            if (editingContacts.length <= 1) {
                showMessage('At least one contact is required.', true);
                return;
            }
            editingContacts.splice(index, 1);
            if (!editingContacts.some(c => c.isPrimary)) {
                editingContacts[0].isPrimary = true;
            }
            renderContactsEditor();
        }

        function showEditArea() {
            const area = document.getElementById('client-edit-area');
            area.style.display = '';
            editingContacts = (client.contacts || []).map(c => ({
                id: c.id,
                contactName: c.contactName,
                role: c.role || '',
                phone: c.phone,
                email: c.email || '',
                address: c.address || '',
                isPrimary: !!c.isPrimary,
                isActive: !!c.isActive
            }));

            if (!editingContacts.length) {
                editingContacts = [emptyContact()];
            }

            area.innerHTML = `
                <h3 class="section-title">Edit Client & Contacts</h3>
                <div class="form-grid two-col">
                    <label>Client Name <input id="edit-client-name" class="text-input" value="${esc(client.clientName)}" /></label>
                    <label>OIB <input id="edit-oib" class="text-input" value="${esc(client.oib || '')}" /></label>
                    <label>Payment Terms <input id="edit-payment-terms" class="text-input" value="${esc(client.paymentTerms || '')}" /></label>
                    <label>Notes <input id="edit-notes" class="text-input" value="${esc(client.notes || '')}" /></label>
                </div>
                <h4 class="section-title">Contacts</h4>
                <div id="contact-editor"></div>
                <div class="modal-actions">
                    <button id="save-client-btn" class="btn btn-sm">Save</button>
                    <button id="cancel-client-edit-btn" class="btn btn-sm">Cancel</button>
                </div>
            `;

            renderContactsEditor();

            document.getElementById('save-client-btn').addEventListener('click', saveClientProfile);
            document.getElementById('cancel-client-edit-btn').addEventListener('click', () => {
                document.getElementById('client-edit-area').style.display = 'none';
            });
        }

        async function saveClientProfile() {
            const payload = {
                clientName: document.getElementById('edit-client-name').value.trim(),
                oib: document.getElementById('edit-oib').value.trim() || null,
                paymentTerms: document.getElementById('edit-payment-terms').value.trim() || null,
                notes: document.getElementById('edit-notes').value.trim() || null,
                contacts: editingContacts.map(c => ({
                    id: c.id || null,
                    contactName: String(c.contactName || '').trim(),
                    role: String(c.role || '').trim() || null,
                    phone: String(c.phone || '').trim(),
                    email: String(c.email || '').trim() || null,
                    address: String(c.address || '').trim() || null,
                    isPrimary: !!c.isPrimary,
                    isActive: !!c.isActive
                }))
            };

            if (!payload.clientName) {
                showMessage('Client name is required.', true);
                return;
            }

            if (!payload.contacts.length || payload.contacts.some(c => !c.contactName || !c.phone)) {
                showMessage('Every contact must have name and phone.', true);
                return;
            }

            if (!payload.contacts.some(c => c.isPrimary && c.isActive)) {
                const firstActive = payload.contacts.find(c => c.isActive);
                if (firstActive) firstActive.isPrimary = true;
            }

            try {
                const res = await apiFetch(`/api/clients/${clientId}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });

                const result = await res.json();
                if (!res.ok) {
                    showMessage(typeof result === 'string' ? result : (result?.message || 'Failed to save client profile.'), true);
                    return;
                }

                client = result;
                showMessage('Client profile saved.');
                document.getElementById('client-edit-area').style.display = 'none';
                renderHeader();
                renderContacts();
                renderSites();
                renderBookings();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function convertType(newType) {
            if (!newType || newType === client.type) return;
            if (!confirm(`Convert client to ${newType}?`)) {
                document.getElementById('type-convert-select').value = '';
                return;
            }

            try {
                const res = await apiFetch(`/api/clients/${clientId}/type`, {
                    method: 'PUT',
                    body: JSON.stringify({ newType })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('Client type updated.');
                    await loadClient();
                } else {
                    showMessage(typeof result === 'string' ? result : (result?.message || 'Failed to update type.'), true);
                }
            } catch {
                showMessage('Network error.', true);
            } finally {
                document.getElementById('type-convert-select').value = '';
            }
        }

        async function addSite() {
            const payload = {
                siteName: document.getElementById('new-site-name').value.trim(),
                address: document.getElementById('new-site-address').value.trim(),
                city: document.getElementById('new-site-city').value.trim() || null,
                postalCode: document.getElementById('new-site-postal').value.trim() || null,
                siteType: document.getElementById('new-site-type').value || null,
                floorAreaM2: document.getElementById('new-site-area').value === '' ? null : Number(document.getElementById('new-site-area').value),
                accessNotes: document.getElementById('new-site-notes').value.trim() || null,
                isActive: true
            };

            if (!payload.siteName || !payload.address) {
                showMessage('Site name and address are required.', true);
                return;
            }

            try {
                const res = await apiFetch(`/api/clients/${clientId}/sites`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (!res.ok) {
                    showMessage(typeof result === 'string' ? result : (result?.message || 'Failed to create site.'), true);
                    return;
                }
                showMessage('Site added.');
                await loadClient();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function saveSite(siteId) {
            const payload = {
                siteName: document.getElementById(`site-name-${siteId}`).value.trim(),
                address: document.getElementById(`site-address-${siteId}`).value.trim(),
                city: document.getElementById(`site-city-${siteId}`).value.trim() || null,
                postalCode: document.getElementById(`site-postal-${siteId}`).value.trim() || null,
                siteType: document.getElementById(`site-type-${siteId}`).value || null,
                floorAreaM2: document.getElementById(`site-area-${siteId}`).value === '' ? null : Number(document.getElementById(`site-area-${siteId}`).value),
                accessNotes: document.getElementById(`site-notes-${siteId}`).value.trim() || null,
                isActive: document.getElementById(`site-active-${siteId}`).checked
            };

            try {
                const res = await apiFetch(`/api/clients/${clientId}/sites/${siteId}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (!res.ok) {
                    showMessage(typeof result === 'string' ? result : (result?.message || 'Failed to save site.'), true);
                    return;
                }
                showMessage('Site updated.');
                await loadClient();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function deactivateSite(siteId) {
            if (!confirm('Deactivate this site?')) return;
            try {
                const res = await apiFetch(`/api/clients/${clientId}/sites/${siteId}`, { method: 'DELETE' });
                const result = await res.json();
                if (!res.ok) {
                    showMessage(typeof result === 'string' ? result : (result?.message || 'Failed to deactivate site.'), true);
                    return;
                }
                showMessage('Site deactivated.');
                await loadClient();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function loadClient() {
            try {
                const res = await apiFetch(`/api/clients/${clientId}`);
                if (!res.ok) {
                    showMessage('Client not found.', true);
                    setTimeout(() => { window.location.href = '/admin/clients.html'; }, 1000);
                    return;
                }
                client = await res.json();
                renderHeader();
                renderContacts();
                renderSites();
                renderBookings();
            } catch {
                showMessage('Failed to load client.', true);
            }
        }

        document.getElementById('edit-client-btn').addEventListener('click', showEditArea);
        document.getElementById('type-convert-select').addEventListener('change', (e) => convertType(e.target.value));
        document.getElementById('new-booking-btn').addEventListener('click', () => {
            window.location.href = '/admin/bookings.html';
        });

        loadClient();
    </script>
</body>
</html>
