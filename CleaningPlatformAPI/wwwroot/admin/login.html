<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page_admin_login">Admin Login — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="login-page">
<main class="login-card">
    <div id="lang-switcher" style="text-align:right;margin-bottom:0.5rem;"></div>
    <h1 data-i18n="admin_login_title">Admin Login</h1>
    <p class="login-subtitle" data-i18n="admin_login_subtitle">Enter your credentials to access the admin panel.</p>
    <div id="login-error" class="alert alert-danger" style="display:none;"></div>
    <form id="login-form" class="form-grid">
        <div>
            <label data-i18n="label_username">Username</label>
            <input type="text" id="username" class="text-input full-width" required placeholder="Enter your username" />
        </div>
        <div>
            <label data-i18n="label_password">Password</label>
            <input type="password" id="password" class="text-input full-width" required placeholder="Enter your password" />
        </div>
        <button type="submit" class="btn" style="width:100%;justify-content:center;padding:0.6rem;margin-top:0.5rem;" data-i18n="btn_sign_in">Sign in</button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:0.8rem;">
        <a href="/public/index.html" class="link" style="color:var(--text-muted);">&larr; Back to website</a>
    </p>
</main>
<script>
    const API_BASE = '/api';
    const loginForm = document.getElementById('login-form');
    const errorDiv = document.getElementById('login-error');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await res.json();
            if (result.success && result.data) {
                localStorage.setItem('accessToken', result.data);
                window.location.href = 'index.html';
            } else {
                var __errorMsg = result.message || 'Invalid credentials.';
                if (result.code && window.ERROR_CODE_MAP && window.ERROR_CODE_MAP[result.code] && window.__I18N_DATA) {
                    var translated = window.__I18N_DATA[window.ERROR_CODE_MAP[result.code]];
                    if (translated) __errorMsg = translated;
                }
                errorDiv.textContent = __errorMsg;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.style.display = 'block';
        }
    });

    if (localStorage.getItem('accessToken')) {
        window.location.href = 'index.html';
    }
</script>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
