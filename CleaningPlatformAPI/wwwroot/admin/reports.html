<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_reports">Reports — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="page_admin_reports">Finance & Reports</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            
            <button id="export-btn" class="btn btn-sm">Export invoices to Excel</button>
        </div>
        <div id="error-container"></div>
        <div id="dashboard-stats" class="dashboard-grid"></div>

        <section class="detail-section"><h2 class="section-title">Monthly Revenue</h2><div id="revenue-table"></div></section>
        <section class="detail-section"><h2 class="section-title">Top Clients</h2><div id="top-clients-table"></div></section>
        <section class="detail-section"><h2 class="section-title">Employee Utilization</h2><div id="utilization-table"></div></section>
        <section class="detail-section"><h2 class="section-title">Job Completion Rate</h2><div id="completion-table"></div></section>
        <section class="detail-section"><h2 class="section-title">Overdue Invoices</h2><div id="overdue-stats" class="kpi-grid"></div></section>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/reports.js"></script>
</div>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
