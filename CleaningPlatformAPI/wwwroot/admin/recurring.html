<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recurring Schedules — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong>Recurring Schedules</strong></div>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            
            <div style="display:flex; gap:0.5rem;">
                <button id="run-auto-btn" class="btn btn-sm">Run Auto-Generate</button>
            </div>
        </div>
        <div id="error-container"></div>
        <div id="recurring-list"></div>
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width:500px;">
            <h2>Edit Recurring Schedule</h2>
            <form id="edit-form" class="form-grid two-col">
                <label>Frequency
                    <select id="edit-frequency" class="text-input">
                        <option value="Weekly">Weekly</option>
                        <option value="Biweekly">Biweekly</option>
                        <option value="Monthly">Monthly</option>
                    </select>
                </label>
                <label id="edit-dayofweek-group">Day of Week
                    <select id="edit-dayofweek" class="text-input">
                        <option value="">--</option>
                        <option value="0">Sunday</option>
                        <option value="1">Monday</option>
                        <option value="2">Tuesday</option>
                        <option value="3">Wednesday</option>
                        <option value="4">Thursday</option>
                        <option value="5">Friday</option>
                        <option value="6">Saturday</option>
                    </select>
                </label>
                <label id="edit-dayofmonth-group">Day of Month (1-28)
                    <input type="number" id="edit-dayofmonth" class="text-input" min="1" max="28" />
                </label>
                <label>Weeks Ahead (1-52)
                    <input type="number" id="edit-weeksahead" class="text-input" min="1" max="52" />
                </label>
                <label class="full-span">End Date (optional)
                    <input type="date" id="edit-endson" class="text-input" />
                </label>
                <div class="full-span" style="display:flex; gap:0.5rem;">
                    <button type="submit" class="btn btn-sm">Save</button>
                    <button type="button" id="edit-cancel-btn" class="btn btn-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- End Series Modal -->
    <div id="end-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <h2>End Series</h2>
            <p style="color:#c62828; font-weight:600;">All pending bookings from this date will be cancelled.</p>
            <form id="end-form" class="form-grid">
                <label>End From Date
                    <input type="date" id="end-date" class="text-input" />
                </label>
                <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                    <button type="submit" class="btn btn-sm" style="background:#c62828;color:#fff;">End Series</button>
                    <button type="button" id="end-cancel-btn" class="btn btn-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/recurring.js"></script>
</div>
</body>
</html>
