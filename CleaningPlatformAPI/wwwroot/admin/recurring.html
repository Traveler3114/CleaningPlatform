<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_recurring">Recurring Schedules — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="content_breadcrumb_recurring">Recurring Schedules</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="hr">HR</button></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            
            <div style="display:flex; gap:0.5rem;">
                <button id="run-auto-btn" class="btn btn-sm" data-i18n="btn_run_auto_generate">Run Auto-Generate</button>
            </div>
        </div>
        <div id="error-container"></div>
        <div id="recurring-list"></div>
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width:500px;">
            <h2 data-i18n="modal_edit_recurring">Edit Recurring Schedule</h2>
            <form id="edit-form" class="form-grid two-col">
                <label data-i18n="label_frequency">Frequency
                    <select id="edit-frequency" class="text-input">
                        <option value="Weekly" data-i18n="freq_weekly">Weekly</option>
                        <option value="Biweekly" data-i18n="freq_biweekly">Biweekly</option>
                        <option value="Monthly" data-i18n="freq_monthly">Monthly</option>
                    </select>
                </label>
                <label id="edit-dayofweek-group" data-i18n="label_day_of_week">Day of Week
                    <select id="edit-dayofweek" class="text-input">
                        <option value="">--</option>
                        <option value="0" data-i18n="day_sunday">Sunday</option>
                        <option value="1" data-i18n="day_monday">Monday</option>
                        <option value="2" data-i18n="day_tuesday">Tuesday</option>
                        <option value="3" data-i18n="day_wednesday">Wednesday</option>
                        <option value="4" data-i18n="day_thursday">Thursday</option>
                        <option value="5" data-i18n="day_friday">Friday</option>
                        <option value="6" data-i18n="day_saturday">Saturday</option>
                    </select>
                </label>
                <label id="edit-dayofmonth-group" data-i18n="label_day_of_month">Day of Month (1-28)
                    <input type="number" id="edit-dayofmonth" class="text-input" min="1" max="28" />
                </label>
                <label data-i18n="label_weeks_ahead">Weeks Ahead (1-52)
                    <input type="number" id="edit-weeksahead" class="text-input" min="1" max="52" />
                </label>
                <label class="full-span" data-i18n="label_end_date_optional">End Date (optional)
                    <input type="date" id="edit-endson" class="text-input" />
                </label>
                <div class="full-span" style="display:flex; gap:0.5rem;">
                    <button type="submit" class="btn btn-sm" data-i18n="btn_save">Save</button>
                    <button type="button" id="edit-cancel-btn" class="btn btn-sm" data-i18n="btn_cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- End Series Modal -->
    <div id="end-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <h2 data-i18n="modal_end_series_title">End Series</h2>
            <p style="color:#c62828; font-weight:600;" data-i18n="modal_end_series_warning">All pending bookings from this date will be cancelled.</p>
            <form id="end-form" class="form-grid">
                <label data-i18n="label_end_from_date">End From Date
                    <input type="date" id="end-date" class="text-input" />
                </label>
                <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                    <button type="submit" class="btn btn-sm" style="background:#c62828;color:#fff;" data-i18n="btn_end_series">End Series</button>
                    <button type="button" id="end-cancel-btn" class="btn btn-sm" data-i18n="btn_cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/recurring.js"></script>
</div>
<script src="/js/i18n.js"></script>
</body>
</html>
