<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_bookings">Bookings — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="page_admin_bookings">Bookings</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="hr">HR</button></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            
            <div class="date-form">
                <button id="new-booking-btn" class="btn btn-sm" data-i18n="btn_create_booking">New Booking</button>
                <form id="filter-form" style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
                    <label for="date-filter" data-i18n="label_date">Select Date:</label>
                    <input type="date" id="date-filter" class="date-input" />
                    <button type="submit" class="btn btn-sm" data-i18n="btn_filter">Filter</button>
                    <button id="show-all-btn" type="button" class="btn btn-sm" data-i18n="btn_show_all">Show All</button>
                </form>
            </div>
        </div>

        <div id="new-booking-panel" class="card-lite" style="display:none; margin-bottom:1rem;">
            <h2 class="section-title" data-i18n="btn_create_booking">Create Admin Booking</h2>
            <form id="create-booking-form" class="form-grid two-col">
                <label><span data-i18n="label_client">Client</span> <select id="client-id" class="text-input" required><option value="">Select client</option></select></label>
                <label><span data-i18n="th_site">Site</span> <select id="site-id" class="text-input"><option value="">No site</option></select></label>
                <label><span data-i18n="label_service">Service type</span> <select id="service-type" class="text-input"><option value="Vehicle">Vehicle</option><option value="SiteBased">Site Based</option><option value="Boat">Boat</option></select></label>
                <label><span data-i18n="label_date">Date</span> <input type="date" id="booking-date" class="text-input" required /></label>
                <label><span data-i18n="label_hour">Hour</span> <input type="number" id="booking-hour" min="0" max="23" class="text-input" required /></label>
                <label><span data-i18n="label_service">Initial service</span> <select id="initial-service" class="text-input"><option value="">No initial service</option></select></label>
                <label class="full-span"><span data-i18n="label_notes">Notes</span> <textarea id="booking-notes" class="text-input"></textarea></label>
                <div class="full-span"><button type="submit" class="btn btn-sm" data-i18n="btn_create_booking">Create Booking</button></div>
            </form>
        </div>

        <div id="error-container"></div>
        <div id="bookings-list"></div>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/bookings.js"></script>
</div>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
