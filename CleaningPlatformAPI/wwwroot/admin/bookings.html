<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<header class="admin-header">
    <div class="header-inner">
        <span class="brand">Cleaning Platform</span>
        <nav class="main-nav">
            <div class="nav-group">
                <button class="nav-group__label">Operations</button>
                <div class="nav-group__dropdown">
                    <a href="/admin/index.html" class="nav-group__item">Daily View</a>
                    <a href="/admin/calendar.html" class="nav-group__item">Calendar</a>
                </div>
            </div>
            <div class="nav-group">
                <button class="nav-group__label">Bookings</button>
                <div class="nav-group__dropdown">
                    <a href="/admin/bookings.html" class="nav-group__item">Bookings</a>
                    <a href="/admin/invoices.html" class="nav-group__item">Invoices</a>
                </div>
            </div>
            <div class="nav-group">
                <button class="nav-group__label">Clients</button>
                <div class="nav-group__dropdown">
                    <a href="/admin/clients.html" class="nav-group__item">Client List</a>
                </div>
            </div>
            <div class="nav-group">
                <button class="nav-group__label">Config</button>
                <div class="nav-group__dropdown">
                    <a href="/admin/schedule.html" class="nav-group__item">Schedule</a>
                    <a href="/admin/services.html" class="nav-group__item">Services</a>
                    <a href="/admin/sops.html" class="nav-group__item">SOPs</a>
                </div>
            </div>
            <div class="nav-group">
                <button class="nav-group__label">Admin</button>
                <div class="nav-group__dropdown">
                    <a href="/admin/users.html" class="nav-group__item">Users</a>
                    <a href="/admin/roles.html" class="nav-group__item">Roles</a>
                    <a href="/admin/reports.html" class="nav-group__item">Reports</a>
                </div>
            </div>
        </nav>
        <div class="user-pill">
            <div class="user-pill-info">
                <a href="/admin/profile.html" class="user-pill-name">Loading...</a>
                <span class="user-pill-role"></span>
            </div>
            <button id="logout-btn" class="logout-btn">Sign out</button>
        </div>
    </div>
</header>
<main class="admin-main">
    <div class="page-header">
        <h1>Bookings</h1>
        <div class="date-form">
            <button id="new-booking-btn" class="btn btn-sm">New Booking</button>
            <form id="filter-form" style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
                <label for="date-filter">Select Date:</label>
                <input type="date" id="date-filter" class="date-input" />
                <button type="submit" class="btn btn-sm">Filter</button>
                <button id="show-all-btn" type="button" class="btn btn-sm">Show All</button>
            </form>
        </div>
    </div>

    <div id="new-booking-panel" class="card-lite" style="display:none; margin-bottom:1rem;">
        <h2 class="section-title">Create Admin Booking</h2>
        <form id="create-booking-form" class="form-grid two-col">
            <label>Client <select id="client-id" class="text-input" required><option value="">Select client</option></select></label>
            <label>Site <select id="site-id" class="text-input"><option value="">No site</option></select></label>
            <label>Service type <select id="service-type" class="text-input"><option value="Vehicle">Vehicle</option><option value="SiteBased">Site Based</option><option value="Boat">Boat</option></select></label>
            <label>Date <input type="date" id="booking-date" class="text-input" required /></label>
            <label>Hour <input type="number" id="booking-hour" min="0" max="23" class="text-input" required /></label>
            <label>Initial service <select id="initial-service" class="text-input"><option value="">No initial service</option></select></label>
            <label class="full-span">Notes <textarea id="booking-notes" class="text-input"></textarea></label>
            <div class="full-span"><button type="submit" class="btn btn-sm">Create Booking</button></div>
        </form>
    </div>

    <div id="error-container"></div>
    <div id="bookings-list"></div>
</main>
<footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
<script src="/admin/js/admin-api.js"></script>
<script src="/admin/js/admin-common.js"></script>
<script src="/admin/js/bookings.js"></script>
</body>
</html>
