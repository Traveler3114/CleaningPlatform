<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Detail — Vehicle Cleaning Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="admin-header"><div class="header-inner"></div></header>

    <main class="admin-main">
        <div id="message-area"></div>

        <section class="detail-section" id="booking-header"></section>
        <section class="detail-section" id="client-info"></section>
        <section class="detail-section" id="assignment"></section>
        <section class="detail-section" id="services"></section>

        <button class="btn btn-sm" id="back-btn">Back</button>
    </main>

    <footer class="admin-footer">
        <p>&copy; <span id="year"></span> Vehicle Cleaning Admin</p>
    </footer>

    <script src="../js/permissions.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        if (!injectAdminHeader('bookings')) { /* redirected */ }
        if (!Auth.requirePermission('pages.bookings')) { /* redirected */ }

        const bookingId = Number(new URLSearchParams(window.location.search).get('id'));
        if (!bookingId) window.location.href = '/admin/bookings.html';

        let booking = null;
        let activeEmployees = [];
        let servicesCatalog = [];

        function esc(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseOperationData(payload) {
            if (payload && typeof payload === 'object' && 'success' in payload) {
                return payload.success ? payload.data : null;
            }
            return payload;
        }

        function showMessage(message, isError = false) {
            const area = document.getElementById('message-area');
            area.innerHTML = `<div class="alert ${isError ? '' : 'alert-success'}">${esc(message)}</div>`;
            if (isError) {
                const alert = area.querySelector('.alert');
                alert.style.background = '#fce4ec';
                alert.style.color = '#c62828';
                alert.style.border = '1px solid #ef9a9a';
            }
            setTimeout(() => { area.innerHTML = ''; }, 3000);
        }

        function renderHeader() {
            document.title = `Booking #${booking.id} — Detail`;
            document.getElementById('booking-header').innerHTML = `
                <div class="page-header">
                    <div>
                        <h1>Booking #${booking.id}</h1>
                        <p>${String(booking.date).slice(0, 10)} at ${booking.hour}:00</p>
                    </div>
                    <span class="badge badge-${String(booking.status).toLowerCase()}">${esc(booking.status)}</span>
                </div>
                <div class="inline-form" style="margin-top:0.7rem;">
                    <select id="status-select" class="status-select">
                        ${['Pending','Confirmed','InProgress','Completed','Cancelled'].map(s => `<option value="${s}"${booking.status === s ? ' selected' : ''}>${s}</option>`).join('')}
                    </select>
                    <button class="btn btn-sm" id="save-status-btn">Save</button>
                </div>
            `;

            document.getElementById('save-status-btn').addEventListener('click', updateStatus);
        }

        function renderClientInfo() {
            document.getElementById('client-info').innerHTML = `
                <h2 class="section-title">Client Info</h2>
                <p><strong>Name:</strong> <a href="/admin/client.html?id=${booking.clientId}">${esc(booking.clientName || booking.customerName)}</a></p>
                <p><strong>Phone:</strong> ${esc(booking.clientPhone || booking.phone || '-')}</p>
                <p><strong>Email:</strong> ${esc(booking.clientEmail || '-')}</p>
            `;
        }

        function renderAssignment() {
            const selectedId = booking.assignedEmployeeId ?? '';
            document.getElementById('assignment').innerHTML = `
                <h2 class="section-title">Employee Assignment</h2>
                <p><strong>Current:</strong> ${esc(booking.assignedEmployeeName || 'Unassigned')}</p>
                <div class="inline-form">
                    <select id="employee-select" class="status-select">
                        <option value="">Unassigned</option>
                        ${activeEmployees.map(e => `<option value="${e.id}"${String(selectedId) === String(e.id) ? ' selected' : ''}>${esc(e.fullName)} (${esc(e.role)})</option>`).join('')}
                    </select>
                    <button class="btn btn-sm" id="save-assignment-btn">Save</button>
                </div>
            `;
            document.getElementById('save-assignment-btn').addEventListener('click', saveAssignment);
        }

        function renderServices() {
            const rows = (booking.services || []).map(s => `
                <tr>
                    <td>${esc(s.serviceName)}</td>
                    <td>${s.quantity}</td>
                    <td>${s.estimatedPrice ?? ''}</td>
                    <td>
                        <div class="inline-form">
                            <input id="final-price-${s.id}" type="number" step="0.01" class="small-input" value="${s.finalPrice ?? ''}" />
                            <button class="btn btn-sm" onclick="updateServicePrice(${s.id})">Save</button>
                        </div>
                    </td>
                    <td>${esc(s.notes || '-')}</td>
                    <td><button class="btn btn-sm" onclick="removeService(${s.id})">Remove</button></td>
                </tr>
            `).join('');

            document.getElementById('services').innerHTML = `
                <h2 class="section-title">Services</h2>
                ${(booking.services || []).length ? `
                    <table class="admin-table">
                        <thead>
                            <tr><th>Name</th><th>Quantity</th><th>Estimated Price</th><th>Final Price</th><th>Notes</th><th>Actions</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                ` : '<div class="alert alert-info">No services assigned.</div>'}

                <div class="card-lite">
                    <h3 class="section-title">+ Add Service</h3>
                    <div class="inline-form" style="flex-wrap:wrap;">
                        <select id="add-service-id" class="status-select">
                            <option value="">Select service</option>
                            ${servicesCatalog.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')}
                        </select>
                        <input id="add-service-qty" class="small-input" type="number" min="0.01" step="0.01" value="1" placeholder="Qty" />
                        <input id="add-service-estimated" class="small-input" type="number" min="0" step="0.01" placeholder="Estimated" />
                        <input id="add-service-notes" class="text-input" type="text" placeholder="Notes (optional)" />
                        <button id="add-service-btn" class="btn btn-sm">Add Service</button>
                    </div>
                </div>
            `;

            document.getElementById('add-service-btn').addEventListener('click', addService);
        }

        async function updateStatus() {
            const status = document.getElementById('status-select').value;
            try {
                const res = await apiFetch(`/api/bookings/${bookingId}/status`, {
                    method: 'PUT',
                    body: JSON.stringify({ status })
                });
                const payload = await res.json();
                const data = parseOperationData(payload);
                if (!res.ok || !data) {
                    showMessage(payload?.message || 'Failed to update status.', true);
                    return;
                }
                showMessage('Status updated.');
                await loadBooking();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function saveAssignment() {
            const raw = document.getElementById('employee-select').value;
            const employeeId = raw ? Number(raw) : null;
            try {
                const res = await apiFetch(`/api/bookings/${bookingId}/assign`, {
                    method: 'PUT',
                    body: JSON.stringify({ employeeId })
                });
                const result = await res.json();
                if (!res.ok || !result?.success) {
                    showMessage(result?.message || 'Failed to save assignment.', true);
                    return;
                }
                showMessage('Assignment updated.');
                booking = result.data;
                renderHeader();
                renderClientInfo();
                renderAssignment();
                renderServices();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function addService() {
            const serviceCatalogId = Number(document.getElementById('add-service-id').value);
            const quantity = Number(document.getElementById('add-service-qty').value || '1');
            const estimatedRaw = document.getElementById('add-service-estimated').value;
            const estimatedPrice = estimatedRaw === '' ? null : Number(estimatedRaw);
            const notes = document.getElementById('add-service-notes').value.trim() || null;

            if (!serviceCatalogId) {
                showMessage('Select a service first.', true);
                return;
            }

            try {
                const res = await apiFetch(`/api/bookings/${bookingId}/services`, {
                    method: 'POST',
                    body: JSON.stringify({ serviceCatalogId, quantity, estimatedPrice, notes })
                });
                const result = await res.json();
                if (!res.ok || !result?.success) {
                    showMessage(result?.message || 'Failed to add service.', true);
                    return;
                }
                showMessage('Service added.');
                booking = result.data;
                renderHeader();
                renderClientInfo();
                renderAssignment();
                renderServices();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function removeService(serviceId) {
            if (!confirm('Remove this service?')) return;
            try {
                const res = await apiFetch(`/api/bookings/${bookingId}/services/${serviceId}`, { method: 'DELETE' });
                const result = await res.json();
                if (!res.ok || !result?.success) {
                    showMessage(result?.message || 'Failed to remove service.', true);
                    return;
                }
                showMessage('Service removed.');
                await loadBooking();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function updateServicePrice(serviceId) {
            const field = document.getElementById(`final-price-${serviceId}`);
            const finalPrice = field.value === '' ? null : Number(field.value);
            try {
                const res = await apiFetch(`/api/bookings/${bookingId}/services/${serviceId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ finalPrice })
                });
                const result = await res.json();
                if (!res.ok || !result?.success) {
                    showMessage(result?.message || 'Failed to update service price.', true);
                    return;
                }
                showMessage('Service price updated.');
                booking = result.data;
                renderHeader();
                renderClientInfo();
                renderAssignment();
                renderServices();
            } catch {
                showMessage('Network error.', true);
            }
        }

        async function loadEmployees() {
            try {
                const res = await apiFetch('/api/employees');
                const result = await res.json();
                activeEmployees = result?.success ? (result.data || []) : [];
            } catch {
                activeEmployees = [];
            }
        }

        async function loadServiceCatalog() {
            try {
                const res = await apiFetch('/api/services');
                const result = await res.json();
                servicesCatalog = result?.success ? (result.data || []) : [];
            } catch {
                servicesCatalog = [];
            }
        }

        async function loadBooking() {
            try {
                const res = await apiFetch(`/api/bookings/${bookingId}`);
                if (!res.ok) {
                    showMessage('Booking not found.', true);
                    return;
                }
                const payload = await res.json();
                booking = parseOperationData(payload);
                if (!booking) {
                    showMessage('Booking not found.', true);
                    return;
                }
                renderHeader();
                renderClientInfo();
                renderAssignment();
                renderServices();
            } catch {
                showMessage('Failed to load booking detail.', true);
            }
        }

        document.getElementById('back-btn').addEventListener('click', () => {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/admin/bookings.html';
            }
        });

        (async () => {
            try {
                await Promise.all([loadEmployees(), loadServiceCatalog(), loadBooking()]);
            } catch {
                showMessage('Failed to initialize booking detail page.', true);
            }
        })();
        window.removeService = removeService;
        window.updateServicePrice = updateServicePrice;
    </script>
</body>
</html>
