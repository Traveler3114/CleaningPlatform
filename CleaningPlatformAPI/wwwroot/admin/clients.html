<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clients — Vehicle Cleaning Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <header class="admin-header"><div class="header-inner"></div></header>

    <main class="admin-main">
        <div class="page-header">
            <h1>Clients</h1>
            <button id="new-client-btn" class="btn" style="display:none;">+ New Client</button>
        </div>

        <div class="filter-row card-lite">
            <input id="search-input" type="text" placeholder="Search by name or phone" class="text-input" />
            <select id="type-filter" class="status-select">
                <option value="">All</option>
                <option value="OneTime">OneTime</option>
                <option value="RepeatIndividual">RepeatIndividual</option>
                <option value="RepeatBusiness">RepeatBusiness</option>
            </select>
            <button id="apply-filters" class="btn btn-sm">Apply</button>
        </div>

        <section class="stats-grid" id="stats-grid">
            <div class="kpi-card"><span>Total clients</span><strong id="stat-total">0</strong></div>
            <div class="kpi-card"><span>OneTime</span><strong id="stat-onetime">0</strong></div>
            <div class="kpi-card"><span>RepeatIndividual</span><strong id="stat-repeat-individual">0</strong></div>
            <div class="kpi-card"><span>RepeatBusiness</span><strong id="stat-repeat-business">0</strong></div>
        </section>

        <div id="message-area"></div>
        <div id="clients-table"></div>
    </main>

    <div id="new-client-modal" class="modal-backdrop" style="display:none;">
        <div class="modal-panel">
            <h2 class="section-title">New Client</h2>
            <form id="new-client-form">
                <div class="form-grid two-col">
                    <label>Client Name <input type="text" id="client-name" class="text-input" required /></label>
                    <label>Type
                        <select id="client-type" class="status-select" required>
                            <option value="RepeatIndividual">RepeatIndividual</option>
                            <option value="RepeatBusiness">RepeatBusiness</option>
                        </select>
                    </label>
                    <label>Primary Contact Name <input type="text" id="contact-name" class="text-input" required /></label>
                    <label>Phone <input type="text" id="contact-phone" class="text-input" required /></label>
                    <label>Email <input type="email" id="contact-email" class="text-input" /></label>
                    <label class="business-only">OIB <input type="text" id="client-oib" class="text-input" /></label>
                    <label class="business-only">Payment Terms <input type="text" id="client-payment-terms" class="text-input" /></label>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-sm">Save Client</button>
                    <button type="button" id="cancel-new-client" class="btn btn-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="admin-footer">
        <p>&copy; <span id="year"></span> Vehicle Cleaning Admin</p>
    </footer>

    <script src="../js/permissions.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        if (!injectAdminHeader('clients')) { /* redirected */ }
        if (!Auth.requirePermission('pages.clients')) { /* redirected */ }

        const params = new URLSearchParams(window.location.search);
        const searchInput = document.getElementById('search-input');
        const typeFilter = document.getElementById('type-filter');
        const clientTypeSelect = document.getElementById('client-type');
        const CLIENT_TYPES = ['OneTime', 'RepeatIndividual', 'RepeatBusiness'];
        const CREATE_TYPES = ['RepeatIndividual', 'RepeatBusiness'];

        typeFilter.innerHTML = `<option value=\"\">All</option>${CLIENT_TYPES.map(type => `<option value=\"${type}\">${type}</option>`).join('')}`;
        clientTypeSelect.innerHTML = CREATE_TYPES.map(type => `<option value=\"${type}\">${type}</option>`).join('');

        searchInput.value = params.get('search') || '';
        typeFilter.value = params.get('type') || '';

        const canCreate = Auth.can('pages.clients');
        const newClientBtn = document.getElementById('new-client-btn');
        const newClientModal = document.getElementById('new-client-modal');

        if (canCreate) newClientBtn.style.display = '';

        function esc(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function clientTypeBadge(type) {
            return `<span class="badge badge-${String(type).toLowerCase()}">${esc(type)}</span>`;
        }

        function showMessage(message, isError = false) {
            document.getElementById('message-area').innerHTML = `<div class="alert ${isError ? '' : 'alert-success'}">${esc(message)}</div>`;
            if (isError) {
                const alert = document.querySelector('#message-area .alert');
                alert.style.background = '#fce4ec';
                alert.style.color = '#c62828';
                alert.style.border = '1px solid #ef9a9a';
            }
            setTimeout(() => { document.getElementById('message-area').innerHTML = ''; }, 3000);
        }

        function getClientsUrl() {
            const query = new URLSearchParams();
            if (searchInput.value.trim()) query.set('search', searchInput.value.trim());
            if (typeFilter.value) query.set('type', typeFilter.value);
            const q = query.toString();
            return q ? `/api/clients?${q}` : '/api/clients';
        }

        function updateFilterQuery() {
            const query = new URLSearchParams();
            if (searchInput.value.trim()) query.set('search', searchInput.value.trim());
            if (typeFilter.value) query.set('type', typeFilter.value);
            window.location.search = query.toString();
        }

        function computeStats(clients) {
            document.getElementById('stat-total').textContent = clients.length;
            document.getElementById('stat-onetime').textContent = clients.filter(c => c.type === 'OneTime').length;
            document.getElementById('stat-repeat-individual').textContent = clients.filter(c => c.type === 'RepeatIndividual').length;
            document.getElementById('stat-repeat-business').textContent = clients.filter(c => c.type === 'RepeatBusiness').length;
        }

        async function loadClients() {
            const table = document.getElementById('clients-table');
            table.innerHTML = '<div class="alert alert-info">Loading clients…</div>';
            try {
                const res = await apiFetch(getClientsUrl());
                const clients = await res.json();
                if (!Array.isArray(clients) || clients.length === 0) {
                    computeStats([]);
                    table.innerHTML = '<div class="alert alert-info">No clients found.</div>';
                    return;
                }

                computeStats(clients);

                const rows = clients.map(c => `
                    <tr>
                        <td>${esc(c.clientName)}</td>
                        <td>${clientTypeBadge(c.type)}</td>
                        <td>${esc(c.primaryContactName || '-')}</td>
                        <td>${esc(c.primaryContactPhone || '-')}</td>
                        <td>${c.totalBookings || 0}</td>
                        <td>${String(c.createdAt || '').slice(0, 10)}</td>
                        <td><a class="btn btn-sm" href="/admin/client.html?id=${c.id}">View</a></td>
                    </tr>
                `).join('');

                table.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Name</th><th>Type</th><th>Primary Contact</th><th>Phone</th>
                                <th>Total Bookings</th><th>Created</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch {
                table.innerHTML = '<div class="alert alert-info">Error loading clients.</div>';
            }
        }

        function syncBusinessFields() {
            const isBusiness = document.getElementById('client-type').value === 'RepeatBusiness';
            document.querySelectorAll('.business-only').forEach(el => {
                el.style.display = isBusiness ? '' : 'none';
            });
        }

        async function createClient(e) {
            e.preventDefault();
            const payload = {
                clientName: document.getElementById('client-name').value.trim(),
                type: document.getElementById('client-type').value,
                primaryContactName: document.getElementById('contact-name').value.trim(),
                primaryContactPhone: document.getElementById('contact-phone').value.trim(),
                primaryContactEmail: document.getElementById('contact-email').value.trim() || null,
                oib: document.getElementById('client-oib').value.trim() || null,
                paymentTerms: document.getElementById('client-payment-terms').value.trim() || null
            };

            try {
                const res = await apiFetch('/api/clients', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('Client created.');
                    newClientModal.style.display = 'none';
                    document.getElementById('new-client-form').reset();
                    syncBusinessFields();
                    await loadClients();
                } else {
                    showMessage(result?.message || 'Failed to create client.', true);
                }
            } catch {
                showMessage('Network error.', true);
            }
        }

        document.getElementById('apply-filters').addEventListener('click', updateFilterQuery);
        typeFilter.addEventListener('change', updateFilterQuery);
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') updateFilterQuery(); });

        newClientBtn.addEventListener('click', () => {
            newClientModal.style.display = 'flex';
            syncBusinessFields();
        });
        document.getElementById('cancel-new-client').addEventListener('click', () => {
            newClientModal.style.display = 'none';
        });
        document.getElementById('client-type').addEventListener('change', syncBusinessFields);
        document.getElementById('new-client-form').addEventListener('submit', createClient);

        syncBusinessFields();
        loadClients();
    </script>
</body>
</html>
