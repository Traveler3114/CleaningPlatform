<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_clients">Clients — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="page_admin_clients">Clients</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header"><button id="new-client-btn" class="btn">+ New Client</button></div>
        <div class="filter-row card-lite">
            <input type="text" id="search-input" placeholder="Search by name or phone" class="text-input" />
            <select id="type-filter" class="status-select">
                <option value="" data-i18n="ui_all">All</option>
                <option>Person</option>
                <option>Business</option>
            </select>
            <button id="apply-filter" class="btn btn-sm">Apply</button>
        </div>
        <div id="kpi-grid" class="kpi-grid"></div>
        <div id="error-container"></div>
        <div id="clients-list"></div>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/clients.js"></script>
</div>
  <script src="/js/i18n-data.js"></script>
  <script src="/js/i18n.js"></script>
</body>
</html>
