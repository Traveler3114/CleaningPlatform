<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOPs — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">Clean<span>Pro</span></div>
    <nav class="sidebar-nav">
        <div class="nav-section">
            <span class="nav-section-title">Operations</span>
            <a href="/admin/index.html" class="nav-item">Daily View</a>
            <a href="/admin/calendar.html" class="nav-item">Calendar</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Bookings</span>
            <a href="/admin/bookings.html" class="nav-item">Bookings</a>
            <a href="/admin/recurring.html" class="nav-item">Recurring</a>
            <a href="/admin/invoices.html" class="nav-item">Invoices</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Clients</span>
            <a href="/admin/clients.html" class="nav-item">Client List</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Config</span>
            <a href="/admin/schedule.html" class="nav-item">Schedule</a>
            <a href="/admin/services.html" class="nav-item">Services</a>
            <a href="/admin/sops.html" class="nav-item">SOPs</a>
        </div>
        <div class="nav-section">
            <span class="nav-section-title">Admin</span>
            <a href="/admin/users.html" class="nav-item">Users</a>
            <a href="/admin/roles.html" class="nav-item">Roles</a>
            <a href="/admin/reports.html" class="nav-item">Reports</a>
        </div>
    </nav>
</aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong>SOP Library</strong></div>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header"></div>
        <div id="error-container"></div>

        <div id="new-template-panel" class="card-lite" style="margin-bottom:1rem;">
            <h2 class="section-title">New Template</h2>
            <form id="create-template-form" class="form-grid two-col">
                <label>Name <input type="text" id="template-name" class="text-input" required /></label>
                <label>Service type <select id="template-service-type" class="text-input"><option>Vehicle</option><option>SiteBased</option><option>Boat</option><option>Generic</option></select></label>
                <label>Linked service <select id="template-service-catalog" class="text-input"><option value="">Optional</option></select></label>
                <label class="checkbox-label"><input type="checkbox" id="template-active" checked /> Active</label>
                <label class="full-span">Description <textarea id="template-description" class="text-input"></textarea></label>
                <div><button type="submit" class="btn btn-sm">Create Template</button></div>
            </form>
        </div>

        <div id="sops-list"></div>

        <!-- Edit SOP Modal -->
        <div id="sop-modal" class="modal-backdrop" style="display:none;">
            <div class="modal-panel">
                <h2 class="section-title">Edit SOP Template</h2>
                <form id="edit-template-form" class="form-grid two-col">
                    <input type="hidden" id="edit-template-id" />
                    <label>Name <input type="text" id="edit-template-name" class="text-input" required /></label>
                    <label>Service type <select id="edit-template-service-type" class="text-input"><option>Vehicle</option><option>SiteBased</option><option>Boat</option><option>Generic</option></select></label>
                    <label>Linked service <select id="edit-template-service-catalog" class="text-input"><option value="">Optional</option></select></label>
                    <label class="checkbox-label"><input type="checkbox" id="edit-template-active" /> Active</label>
                    <label class="full-span">Description <textarea id="edit-template-description" class="text-input"></textarea></label>
                    <div class="modal-actions"><button type="submit" class="btn btn-sm">Save changes</button><button type="button" class="btn btn-sm" onclick="closeSopModal()">Cancel</button></div>
                </form>
                <form id="sop-delete-form" style="margin-top:0.75rem;"><button type="submit" class="btn btn-sm" onclick="return confirm('Deactivate this SOP?')">Deactivate</button></form>
            </div>
        </div>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/sops.js"></script>
</div>
</body>
</html>
