<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_admin_calendar">Calendar — Cleaning Platform</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrapper">
    <header class="top-header">
        <div class="header-left">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="breadcrumb"><strong data-i18n="page_admin_calendar">Calendar</strong></div>
        </div>
        <div class="header-right"><div id="lang-switcher"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="hr">HR</button></div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div class="user-details">
                    <a href="/admin/profile.html" class="user-name">Loading...</a>
                    <span class="user-role"></span>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn" data-i18n="nav_sign_out">Sign out</button>
        </div>
    </header>
    <main class="admin-main">
        <div class="page-header">
            
            <a href="/admin/bookings.html" id="new-booking-btn" class="btn btn-sm">+ New Booking</a>
        </div>
        <div id="employee-view" style="display:none;">
            <div id="employee-week-view"></div>
        </div>
        <div id="admin-view">
            <div class="cal-toolbar">
                <div class="cal-view-pills">
                    <button id="view-week" class="active">Week</button>
                    <button id="view-day">Day</button>
                    <button id="view-month">Month</button>
                </div>
                <div class="cal-nav">
                    <button id="nav-prev" class="cal-nav-btn" title="Previous">←</button>
                    <span id="cal-range-label" class="cal-range-label">Loading...</span>
                    <button id="nav-next" class="cal-nav-btn" title="Next">→</button>
                </div>
                <div>
                    <input type="text" id="emp-filter" placeholder="Filter employees…" class="text-input" style="min-width:160px;" />
                </div>
            </div>
            <div id="error-container"></div>
            <div id="resource-grid">
                <div class="skeleton" style="height:200px; margin:1rem;"></div>
            </div>
        </div>
    </main>
    <footer class="admin-footer"><p>&copy; 2025 Cleaning Platform</p></footer>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-common.js"></script>
    <script src="/admin/js/calendar.js"></script>
</div>
<script src="/js/i18n.js"></script>
</body>
</html>
